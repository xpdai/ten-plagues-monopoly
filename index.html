<!DOCTYPE html>
<!--
  出埃及大冒險 (Moses' Exodus board game) — skeleton build
  =======================================================
  Single self-contained file. No build, no server, no deps. Refresh = new game.

  Two play modes × two sub-modes:
    遊戲軟體模式 (web)  /  大地遊戲模式 (physical)
    × 關主模式 (vs host)  /  玩家對戰模式 (vs another player)

  26 stations follow Moses from the burning bush to the song by the sea.
  Each tile shows the task for the current mode + sub-mode. In this skeleton the
  mini-games are presented as task cards with 完成 / 我贏了 / 我輸了 buttons; the
  board, movement (exact roll to finish, aeroplane-chess rebound), turn order,
  versus-swap, 機會與命運, skips and scoring are all wired up.
-->
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#f4d9a6" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-title" content="出埃及大冒險" />
<title>出埃及大冒險</title>
<style>
  :root{
    --sand:#f6e7c1; --nile:#5bb6dd; --nile-deep:#13415c; --dawn:#ff9e57;
    --dusk:#6b5b95; --leaf:#5fb56a; --leaf-deep:#3d8a48; --ink:#2a2733; --paper:#fffaf0;
    --gold:#e9b949; --clay:#c66b3a; --line:#ece1c8;
    --shadow:0 6px 18px rgba(70,50,20,.14); --shadow-sm:0 2px 6px rgba(70,50,20,.12);
    --radius:16px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;font-family:"Nunito","Helvetica Neue",Arial,"PingFang TC","Microsoft JhengHei",sans-serif;color:var(--ink);
    background:
      radial-gradient(900px 520px at 12% -8%,rgba(91,182,221,.18),transparent 60%),
      radial-gradient(820px 480px at 108% 6%,rgba(233,185,73,.22),transparent 58%),
      linear-gradient(160deg,#fdf3dd 0%,#f4d9a6 100%);
    background-attachment:fixed;min-height:100vh;-webkit-text-size-adjust:100%;}
  body{padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);}
  h1,h2,h3{font-family:"Fredoka","PingFang TC","Microsoft JhengHei",sans-serif;margin:0;letter-spacing:.01em;}
  button{font-family:inherit;font-weight:800;cursor:pointer;border:none;border-radius:12px;padding:10px 18px;
    background:linear-gradient(180deg,#ffb072,var(--dawn));color:#3a2410;box-shadow:var(--shadow-sm);transition:transform .12s ease,box-shadow .12s ease,filter .12s ease;}
  button:hover:not(:disabled){transform:translateY(-1.5px);box-shadow:var(--shadow);filter:saturate(1.05);}
  button:active:not(:disabled){transform:translateY(0);box-shadow:var(--shadow-sm);}
  button:focus-visible{outline:3px solid rgba(91,182,221,.6);outline-offset:2px;}
  button:disabled{opacity:.4;cursor:not-allowed;}
  .hidden{display:none !important;}

  /* ---------- Setup ---------- */
  #setup{max-width:640px;margin:4vh auto;background:linear-gradient(180deg,#fffdf7,var(--paper));padding:30px 28px;border-radius:22px;box-shadow:var(--shadow),inset 0 1px 0 #fff;border:1px solid var(--line);}
  #setup h1{font-size:34px;text-align:center;color:var(--nile-deep);text-shadow:0 1px 0 #fff;}
  #setup p.subtitle{text-align:center;color:#8a7a5a;margin:8px 0 22px;font-weight:600;}
  .setup-group{margin-bottom:20px;}
  .setup-group h3{font-size:13px;margin-bottom:9px;color:var(--clay);text-transform:none;letter-spacing:.04em;display:flex;align-items:center;gap:8px;}
  .setup-group h3::after{content:"";flex:1;height:1px;background:var(--line);}
  .choice-row{display:flex;gap:10px;flex-wrap:wrap;}
  .choice-row button{flex:1;min-width:120px;background:#fff;border:2px solid var(--line);text-align:left;padding:13px 15px;color:var(--ink);box-shadow:none;}
  .choice-row button:hover:not(:disabled){transform:translateY(-1.5px);border-color:#cfe6f3;}
  .choice-row button .c-title{font-size:15px;font-weight:800;}
  .choice-row button .c-desc{font-size:12px;font-weight:600;color:#8a7a5a;margin-top:3px;line-height:1.35;}
  .choice-row button.active{background:linear-gradient(180deg,#f0f9ff,#e4f3fb);border-color:var(--nile);box-shadow:0 0 0 3px rgba(91,182,221,.18);}
  .count-row{display:flex;gap:10px;justify-content:center;}
  .count-row button{min-width:58px;background:#fff;border:2px solid var(--line);color:var(--ink);box-shadow:none;font-size:17px;}
  .count-row button.active{background:linear-gradient(180deg,#6fc3e4,var(--nile));border-color:var(--nile-deep);color:#fff;box-shadow:0 0 0 3px rgba(91,182,221,.2);}
  .count-hint{text-align:center;color:#9a8a66;font-size:13px;margin:9px 0 0;min-height:16px;font-weight:600;}
  .player-rows{display:flex;flex-direction:column;gap:10px;}
  .player-row{display:flex;gap:10px;align-items:center;}
  .player-row input[type=text]{flex:1;min-width:0;padding:10px;border:2px solid #ddd;border-radius:8px;font-size:15px;}
  .swatches{display:flex;gap:6px;flex-wrap:wrap;}
  .swatch{width:36px;height:36px;border-radius:50%;border:3px solid transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:20px;line-height:1;box-shadow:inset 0 2px 3px rgba(255,255,255,.45),inset 0 -2px 3px rgba(0,0,0,.18),0 1px 3px rgba(0,0,0,.25);}
  .swatch.selected{border-color:var(--ink);transform:scale(1.1);}
  .swatch.taken{opacity:.25;cursor:not-allowed;}
  #start-btn{width:100%;font-size:19px;padding:15px;background:linear-gradient(180deg,#74c47f,var(--leaf-deep));color:#fff;margin-top:6px;letter-spacing:.06em;}

  /* ---------- In game ---------- */
  #game{display:none;max-width:1280px;margin:0 auto;padding:14px;}
  #game.active{display:grid;grid-template-columns:1fr 340px;gap:14px;}
  .header-bar{grid-column:1/-1;display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap;background:linear-gradient(180deg,#fffdf7,var(--paper));padding:11px 18px;border-radius:var(--radius);box-shadow:var(--shadow);border:1px solid var(--line);}
  .header-bar h2{color:var(--nile-deep);font-size:21px;}
  .header-bar .mode-tag{font-size:12px;font-weight:800;color:var(--dusk);background:#f1ecff;padding:5px 12px;border-radius:20px;border:1px solid #e2d9f7;}
  .header-bar .new-game{background:#fff;border:2px solid var(--line);color:var(--ink);box-shadow:none;font-size:14px;padding:8px 14px;}

  /* ---------- Board ---------- */
  #board-wrap{background:radial-gradient(circle at 30% 20%,#fff7e6,var(--paper) 60%);padding:10px;border-radius:var(--radius);box-shadow:var(--shadow);overflow:auto;-webkit-overflow-scrolling:touch;}
  #board-fit{position:relative;margin:0 auto;}
  #board{position:relative;width:860px;height:540px;transform-origin:top left;
    background:radial-gradient(circle at 16% 80%,rgba(123,196,127,.16) 0 8%,transparent 8%),radial-gradient(circle at 84% 26%,rgba(110,193,228,.14) 0 10%,transparent 10%);}
  #board .road{position:absolute;inset:0;z-index:0;pointer-events:none;}
  .road-edge{fill:none;stroke:#cbb073;stroke-width:34;stroke-linecap:round;stroke-linejoin:round;opacity:.55;}
  .road-base{fill:none;stroke:#e7cf9a;stroke-width:30;stroke-linecap:round;stroke-linejoin:round;opacity:.9;}
  .road-dash{fill:none;stroke:#fff;stroke-width:3.5;stroke-dasharray:1 18;stroke-linecap:round;opacity:.75;}
  .tile{position:absolute;width:74px;height:62px;transform:translate(-50%,-50%);z-index:1;background:#fff;border:2px solid #e5e5e5;border-radius:12px;padding:3px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;cursor:pointer;overflow:visible;box-shadow:0 2px 5px rgba(0,0,0,.12);transition:box-shadow .15s;}
  .tile:hover,.tile:focus-visible{box-shadow:0 0 0 2px var(--nile),0 2px 6px rgba(0,0,0,.18);outline:none;}
  .tile .icon{font-size:20px;line-height:1;}
  .tile .label{font-size:8px;font-weight:700;line-height:1.05;margin-top:1px;max-width:70px;}
  .tile .idx{position:absolute;top:1px;left:4px;font-size:8px;color:#777;}
  .tile.start{background:linear-gradient(135deg,#ffe4b5,#f6c46f);border-color:#d4a447;}
  .tile.goal{width:88px;height:74px;background:linear-gradient(135deg,#fff0c8,#ffd66a);border-color:#d4a447;box-shadow:0 0 18px rgba(255,200,80,.75);animation:goalPulse 2.4s ease-in-out infinite;}
  @keyframes goalPulse{0%,100%{box-shadow:0 0 14px rgba(255,200,80,.55);}50%{box-shadow:0 0 24px rgba(255,200,80,.95);}}
  .tile.goal .icon{font-size:26px;}
  .tile.move{background:#ffeef0;border-color:#f4c2c2;}
  .tile.versus{background:#eef6ff;border-color:#b9dcf5;}
  .tile.skip{background:#f2f2f2;border-color:#d8d8d8;}
  .tile.chance{background:linear-gradient(135deg,#e8ffe8,#c7f0c9);border-color:#8fd693;}
  .tile.current{box-shadow:0 0 0 3px var(--nile),0 0 14px rgba(91,182,221,.55);border-color:var(--nile);}
  .tokens{position:absolute;bottom:-8px;left:50%;transform:translateX(-50%);display:flex;gap:2px;}
  .token{width:20px;height:20px;border-radius:50%;border:2px solid #fff;display:flex;align-items:center;justify-content:center;font-size:12px;line-height:1;box-shadow:inset 0 2px 3px rgba(255,255,255,.45),inset 0 -2px 3px rgba(0,0,0,.18),0 1px 3px rgba(0,0,0,.35);}

  /* ---------- Sidebar ---------- */
  #sidebar{display:flex;flex-direction:column;gap:12px;}
  .panel{background:linear-gradient(180deg,#fffdf7,var(--paper));padding:15px;border-radius:var(--radius);box-shadow:var(--shadow);border:1px solid var(--line);}
  .panel h3{font-size:13px;margin-bottom:11px;color:var(--clay);letter-spacing:.04em;display:flex;align-items:center;gap:8px;}
  .panel h3::after{content:"";flex:1;height:1px;background:var(--line);}
  .player-card{display:flex;align-items:center;gap:10px;padding:9px;border-radius:11px;margin-bottom:7px;border:2px solid transparent;background:#fff;cursor:pointer;transition:transform .1s ease,box-shadow .1s ease;}
  .player-card:hover{transform:translateX(2px);box-shadow:var(--shadow-sm);}
  .player-card.active{background:linear-gradient(180deg,#fff8e6,#fff1cf);border-color:var(--dawn);box-shadow:0 0 0 3px rgba(255,158,87,.18);}
  .player-card.skipping{opacity:.62;}
  .player-card .av{width:30px;height:30px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:17px;line-height:1;box-shadow:inset 0 2px 3px rgba(255,255,255,.45),inset 0 -2px 3px rgba(0,0,0,.18),0 1px 2px rgba(0,0,0,.25);}
  .player-card .name{font-weight:800;font-size:14px;}
  .player-card .stats{font-size:12px;color:#8a7a5a;font-weight:600;}
  .referee-chip{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:11px;margin-bottom:9px;
    background:linear-gradient(180deg,#f3eeff,#e9e2fb);border:2px dashed #c3b6ec;}
  .referee-chip .ref-av{width:30px;height:30px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:18px;background:#fff;box-shadow:var(--shadow-sm);}
  .referee-chip .name{font-weight:800;font-size:14px;color:var(--dusk);}
  .referee-chip .stats{font-size:11px;color:#8a7a9a;font-weight:600;line-height:1.3;}
  .dice-area{text-align:center;background:linear-gradient(180deg,#fff7e9,#fdedd2)!important;}
  .dice{display:inline-flex;align-items:center;justify-content:center;width:66px;height:66px;background:#fff;border:3px solid var(--ink);border-radius:14px;font-size:32px;line-height:1;margin:10px 0;box-shadow:0 6px 0 rgba(0,0,0,.12),var(--shadow-sm);}
  .die-face{width:100%;height:100%;display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:repeat(3,1fr);padding:9px;box-sizing:border-box;}
  .die-face .cell{display:flex;align-items:center;justify-content:center;}
  .die-face .pip{width:9px;height:9px;border-radius:50%;background:#2a2a3a;box-shadow:inset 0 -1px 1px rgba(0,0,0,.25);}
  .die-face .pip.red{background:#d12f2f;} .die-face .pip.big{width:14px;height:14px;}
  .dice.rolling{animation:shake .4s linear;}
  @keyframes shake{0%,100%{transform:translate(0,0) rotate(0);}25%{transform:translate(-3px,2px) rotate(-6deg);}50%{transform:translate(3px,-2px) rotate(6deg);}75%{transform:translate(-2px,-3px) rotate(-3deg);}}
  .roll-btn{width:100%;font-size:19px;padding:15px;background:linear-gradient(180deg,#74c47f,var(--leaf-deep));color:#fff;letter-spacing:.08em;}
  .roll-btn:disabled{background:linear-gradient(180deg,#c8d6c9,#b6c6b8);color:#eef;}
  #log{max-height:200px;overflow-y:auto;font-size:13px;}
  #log .entry{padding:6px 8px;border-bottom:1px solid var(--line);border-radius:6px;}
  #log .entry:last-child{border-bottom:none;}
  #log .entry.hi{background:linear-gradient(90deg,#fff5d6,#fff);font-weight:700;}

  /* ---------- Modals ---------- */
  .backdrop{position:fixed;inset:0;background:rgba(0,0,0,.55);display:flex;align-items:center;justify-content:center;z-index:100;}
  .modal{background:linear-gradient(180deg,#fffdf7,var(--paper));padding:24px 26px;border-radius:20px;max-width:440px;width:calc(100vw - 36px);text-align:center;box-shadow:0 24px 70px rgba(0,0,0,.34);border:1px solid var(--line);animation:modalIn .22s cubic-bezier(.2,.9,.3,1.2);}
  @keyframes modalIn{from{opacity:0;transform:translateY(10px) scale(.97);}to{opacity:1;transform:none;}}
  .modal .big-icon{font-size:60px;line-height:1;margin:2px 0;filter:drop-shadow(0 3px 4px rgba(0,0,0,.16));}
  .modal h2{font-size:23px;color:var(--nile-deep);margin-bottom:4px;}
  .modal .sub{font-size:12px;font-weight:700;color:var(--dusk);margin-bottom:10px;}
  .modal .text{font-size:14.5px;line-height:1.6;color:#3a3a4a;text-align:left;margin-bottom:16px;white-space:pre-line;}
  .modal .controls{display:flex;flex-direction:column;gap:8px;}
  .modal .controls button{width:100%;font-size:15px;padding:12px 16px;}
  .modal .controls .ghost{background:#fff;border:2px solid #ddd;}
  .modal .controls .good{background:var(--leaf);}
  .modal .controls .warn{background:#f3a9a9;}
  .modal .opp-list{display:flex;flex-direction:column;gap:6px;}
  .modal .opp-list button{display:flex;justify-content:space-between;align-items:center;background:#fff;border:2px solid #ddd;}

  /* ---------- Mini-games ---------- */
  #task-stage{margin:4px 0 14px;}
  #task-stage.hidden{display:none;}
  .mini-tap{height:130px;border-radius:12px;background:var(--nile);color:#fff;font-size:24px;font-weight:800;display:flex;flex-direction:column;gap:6px;align-items:center;justify-content:center;cursor:pointer;user-select:none;-webkit-user-select:none;}
  .mini-tap:active{transform:scale(.98);}
  .mini-field{position:relative;height:210px;background:linear-gradient(#eef7ff,#dcefff);border-radius:12px;overflow:hidden;border:2px solid #b9dcf5;}
  .mini-target{position:absolute;width:44px;height:44px;border-radius:50%;border:none;background:transparent;box-shadow:none;font-size:30px;line-height:1;cursor:pointer;padding:0;}
  .mini-target:hover{transform:none;}
  .mini-dance{display:flex;flex-direction:column;align-items:center;gap:8px;}
  .mini-dance .arrow{font-size:58px;line-height:1;height:64px;}
  .mini-dance .pad{display:grid;grid-template-columns:repeat(4,52px);gap:8px;}
  .mini-dance .pad button{font-size:22px;padding:10px 0;}
  .mini-type-target{font-size:20px;font-weight:800;background:#f3eeff;padding:12px;border-radius:10px;margin-bottom:8px;letter-spacing:2px;}
  .mini-type-input{width:100%;padding:11px;font-size:18px;border:2px solid var(--nile);border-radius:8px;}
  .mini-progress{font-size:13px;font-weight:700;color:#6a6a7a;margin-top:6px;text-align:center;}
  .mini-guy{position:absolute;bottom:2px;font-size:26px;line-height:1;transform:translateX(-50%);pointer-events:none;}
  .mini-drop{position:absolute;font-size:22px;line-height:1;pointer-events:none;}
  .mini-rash{position:absolute;font-size:26px;line-height:1;cursor:pointer;user-select:none;}
  .mini-person{position:absolute;font-size:26px;line-height:1;cursor:grab;touch-action:none;}
  .mini-field,.mini-sea,.mini-trace{touch-action:none;}
  .mini-arrange{display:flex;gap:10px;justify-content:center;}
  .mini-arrange .mini-slot{width:60px;height:60px;font-size:30px;background:#fff;border:2px solid #ddd;border-radius:12px;padding:0;}
  .mini-arrange .mini-slot.sel{border-color:var(--nile);background:#eaf6ff;transform:scale(1.06);}
  .mini-photo{display:flex;flex-direction:column;align-items:center;gap:8px;}
  .mini-photo .mini-file{font-size:14px;}
  .mini-photo-prev img{max-width:220px;max-height:150px;border-radius:8px;}
  .mini-timer{display:flex;flex-direction:column;align-items:center;gap:6px;padding:16px 0;}
  .mini-timer .t-num{font-size:60px;font-weight:800;color:var(--nile-deep);line-height:1;}
  .mini-timer .t-label{font-size:15px;font-weight:700;color:var(--dusk);}

  /* ---------- Win ---------- */
  #win-screen{position:fixed;inset:0;background:linear-gradient(135deg,#fef6e0,#ffd66a);display:flex;align-items:center;justify-content:center;z-index:200;}
  #win-screen .inner{text-align:center;max-width:520px;background:var(--paper);padding:36px;border-radius:20px;box-shadow:0 20px 60px rgba(0,0,0,.25);}
  #win-screen h1{font-size:34px;color:var(--nile-deep);margin-bottom:10px;}
  #win-screen .winner-name{font-size:26px;font-weight:700;color:var(--dawn);margin:8px 0 20px;}
  #win-screen .standings .row{padding:8px;border-bottom:1px solid #eee;display:flex;justify-content:space-between;}
  #win-screen button{width:100%;font-size:18px;padding:14px;background:var(--leaf);margin-top:16px;}

  @media (max-width:760px){
    #setup{padding:18px;margin:2vh auto;}
    #game{padding:8px;}
    #game.active{grid-template-columns:minmax(0,1fr);}
    .header-bar h2{font-size:18px;}
  }
  @media (max-width:480px){
    #board-wrap{padding:6px;}
    .tile .label,.tile .idx{display:none;}
    .roll-btn{padding:16px;font-size:19px;}
  }
  @media (prefers-reduced-motion:reduce){*{animation:none !important;transition:none !important;}}
</style>
</head>
<body>

<!-- ============ SETUP ============ -->
<section id="setup">
  <h1>🏜️ 出埃及大冒險</h1>
  <p class="subtitle">跟著摩西，從荊棘火焰一路走到紅海對岸，向耶和華歌唱。</p>

  <div class="setup-group">
    <h3>遊玩模式</h3>
    <div class="choice-row" id="mode-row">
      <button data-mode="soft"><div class="c-title">🕹️ 遊戲軟體模式</div><div class="c-desc">在螢幕上玩迷你遊戲</div></button>
      <button data-mode="land"><div class="c-title">🌳 大地遊戲模式</div><div class="c-desc">實體場地、做動作闖關</div></button>
    </div>
  </div>

  <div class="setup-group">
    <h3>進行方式</h3>
    <div class="choice-row" id="submode-row">
      <button data-sub="host"><div class="c-title">🧑‍🏫 關主模式</div><div class="c-desc">關主主持出題、陪你猜拳；另有 🤖 電腦玩家同場競賽（限遊戲軟體模式）</div></button>
      <button data-sub="vs"><div class="c-title">⚔️ 玩家對戰模式</div><div class="c-desc">指定同場玩家對戰、可換格</div></button>
    </div>
  </div>

  <div class="setup-group">
    <h3>幾位玩家？</h3>
    <div class="count-row" id="count-row">
      <button data-n="1">1</button><button data-n="2">2</button><button data-n="3">3</button><button data-n="4">4</button>
    </div>
    <p class="count-hint" id="count-hint"></p>
  </div>

  <div class="setup-group">
    <div class="player-rows" id="player-rows"></div>
  </div>

  <button id="start-btn">開始遊戲</button>
</section>

<!-- ============ GAME ============ -->
<section id="game">
  <div class="header-bar">
    <h2>🏜️ 出埃及大冒險</h2>
    <span class="mode-tag" id="mode-tag">—</span>
    <button class="new-game" id="help-btn">❓ 玩法</button>
    <button class="new-game" id="new-game-btn">重新開始</button>
  </div>
  <div id="board-wrap"><div id="board-fit"><div id="board" aria-label="遊戲地圖"></div></div></div>
  <div id="sidebar">
    <div class="panel"><h3>玩家</h3><div id="players-list"></div></div>
    <div class="panel dice-area"><h3 id="turn-name">—</h3><div class="dice" id="dice">🎲</div><button class="roll-btn" id="roll-btn">擲骰子</button></div>
    <div class="panel"><h3>事件紀錄</h3><div id="log" aria-live="polite"></div></div>
  </div>
</section>

<!-- ============ TASK MODAL ============ -->
<div id="task-backdrop" class="backdrop hidden" role="dialog" aria-modal="true">
  <div class="modal">
    <div class="big-icon" id="task-icon">?</div>
    <h2 id="task-title">任務</h2>
    <div class="sub" id="task-sub"></div>

  {n:26,name:"向耶和華歌唱",sub:"終點",icon:"🌟",cls:"goal",
   plan:(m)=>({kind:"goal",text:m==="land"?"抵達終點！盡情喊叫、放聲歡呼！":"抵達終點！播放歡呼的音效，向耶和華歌唱！"})},
];
const GOAL_IDX=TILES.length-1; // 25
const BOARD=TILES;

// Winding path coordinates for 26 tiles (serpentine, bottom → top).
const POS=(function(){
  const n=BOARD.length, cols=7, mX=70, mY=80, W=860, H=540;
  const uW=W-2*mX, uH=H-2*mY, rows=Math.ceil(n/cols), pts=[];
  for(let i=0;i<n;i++){
    const row=Math.floor(i/cols); let col=i%cols;
    if(row%2===1) col=cols-1-col;
    const x=mX+(cols>1?uW*col/(cols-1):uW/2);
    const y=H-mY-(rows>1?uH*row/(rows-1):0);
    pts.push([Math.round(x),Math.round(y+((i%2)?-10:10))]);
  }
  return pts;
})();

const MODE_LABEL={soft:"遊戲軟體模式",land:"大地遊戲模式"};
const SUB_LABEL={host:"關主模式",vs:"玩家對戰模式"};

// ============================================================
// State
// ============================================================
const state=window.state={
  mode:null, submode:null, count:2, picks:[],
  players:[], turnIdx:0, busy:false, log:[],
  taskResolve:null, infoPrev:null,
};

// ============================================================
// Setup
// ============================================================
function normalizeSetup(){
  // 大地遊戲模式沒有電腦關主 → 鎖住關主模式，自動切到玩家對戰。
  if(state.mode==="land" && state.submode==="host") state.submode="vs";
  // 只有「遊戲軟體模式 + 關主模式」才能一個人玩（與電腦關主對戰）。
  if(!isHostGame() && state.count<2) state.count=2;
}
function renderSetup(){
  normalizeSetup();
  const solo=isHostGame();
  document.querySelectorAll("#mode-row button").forEach(b=>b.classList.toggle("active",b.dataset.mode===state.mode));
  document.querySelectorAll("#submode-row button").forEach(b=>{
    b.classList.toggle("active",b.dataset.sub===state.submode);
    if(b.dataset.sub==="host") b.disabled=(state.mode==="land");
  });
  document.querySelectorAll("#count-row button").forEach(b=>{
    b.classList.toggle("active",+b.dataset.n===state.count);
    if(b.dataset.n==="1") b.disabled=!solo;
  });
  const hint=document.getElementById("count-hint");
  if(hint) hint.textContent=solo?"關主模式由關主主持，並有一名 🤖 電腦玩家同場競賽，真人可只有 1 位。":(state.mode==="land"?"大地遊戲模式為玩家對戰，至少 2 人。":"玩家對戰模式至少 2 人。");
  const rows=document.getElementById("player-rows"); rows.innerHTML="";
  state.picks=state.picks.slice(0,state.count);
  for(let i=0;i<state.count;i++){
    if(!state.picks[i]){
      const used=new Set(state.picks.filter(Boolean).map(x=>x.av));
      for(let a=0;a<AVATARS.length;a++){ if(!used.has(a)){ state.picks[i]={av:a,name:""}; break; } }
    }
    const row=document.createElement("div"); row.className="player-row";
    row.innerHTML=`<input type="text" placeholder="玩家 ${i+1}" value="${escapeHtml(state.picks[i].name||"")}" data-idx="${i}"><div class="swatches" data-idx="${i}"></div>`;
    rows.appendChild(row);
    const sw=row.querySelector(".swatches");
    AVATARS.forEach((a,ai)=>{
      const el=document.createElement("div"); el.className="swatch"; el.style.background=a.hex; el.textContent=a.emoji;
      el.dataset.av=ai; el.dataset.row=i; el.setAttribute("role","button"); el.setAttribute("tabindex","0");
      el.title=a.name; sw.appendChild(el);
    });
  }
  refreshSwatches();
}
function refreshSwatches(){
  const taken=new Set(state.picks.map(p=>p&&p.av).filter(v=>v!==undefined&&v!==null));
  document.querySelectorAll("#player-rows .swatch").forEach(el=>{
    const row=+el.dataset.row, av=+el.dataset.av, sel=state.picks[row]&&state.picks[row].av===av;
    const takenOther=!sel&&taken.has(av);
    el.classList.toggle("selected",sel); el.classList.toggle("taken",takenOther);
    el.setAttribute("tabindex",takenOther?"-1":"0");
  });
}
document.getElementById("mode-row").addEventListener("click",e=>{const b=e.target.closest("button[data-mode]");if(b){state.mode=b.dataset.mode;renderSetup();}});
document.getElementById("submode-row").addEventListener("click",e=>{const b=e.target.closest("button[data-sub]");if(b&&!b.disabled){state.submode=b.dataset.sub;renderSetup();}});
document.getElementById("count-row").addEventListener("click",e=>{const b=e.target.closest("button[data-n]");if(b&&!b.disabled){state.count=+b.dataset.n;renderSetup();}});
document.getElementById("player-rows").addEventListener("click",e=>{const sw=e.target.closest(".swatch");if(!sw||sw.classList.contains("taken"))return;const row=+sw.dataset.row;state.picks[row]={...state.picks[row],av:+sw.dataset.av};refreshSwatches();});
document.getElementById("player-rows").addEventListener("keydown",e=>{const sw=e.target.closest&&e.target.closest(".swatch");if(sw&&(e.key==="Enter"||e.key===" ")){e.preventDefault();sw.click();}});
document.getElementById("player-rows").addEventListener("input",e=>{if(e.target.tagName==="INPUT"){state.picks[+e.target.dataset.idx].name=e.target.value;}});

document.getElementById("start-btn").addEventListener("click",()=>{
  if(!state.mode){alert("請先選擇遊玩模式。");return;}
  if(!state.submode){alert("請先選擇進行方式（關主／對戰）。");return;}
  const players=[];
  for(let i=0;i<state.count;i++){
    const pk=state.picks[i];
    if(players.some(p=>p.av===pk.av)){alert("有兩位玩家選了相同的角色。");return;}
    players.push({id:i,name:(pk.name||"").trim()||`玩家 ${i+1}`,av:AVATARS[pk.av],avIdx:pk.av,pos:0,score:0,skipTurns:0,maintaining:null,shoesOff:false});
  }
  startGame(players);
});

function escapeHtml(s){return String(s??"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));}

// ============================================================
// Start
// ============================================================
async function startGame(players){
  // simple dice roll-off for turn order (highest first, ties keep order)
  players.forEach(p=>p._roll=1+Math.floor(Math.random()*6));
  players.sort((a,b)=>b._roll-a._roll);
  // 關主模式：加入一名電腦玩家一起繞圈競賽，排在所有真人之後（真人先手）。
  if(isHostGame()){
    players.push({id:COMP_ID,name:"電腦玩家",av:COMP_AV,avIdx:-1,pos:0,score:0,skipTurns:0,maintaining:null,shoesOff:false,isBot:true,_roll:1+Math.floor(Math.random()*6)});
  }
  state.players=players; state.turnIdx=0; state.busy=false; state.log=[];
  document.getElementById("setup").style.display="none";
  document.getElementById("game").classList.add("active");
  document.getElementById("win-screen").classList.add("hidden");
  document.getElementById("mode-tag").textContent=`${MODE_LABEL[state.mode]} · ${SUB_LABEL[state.submode]}`;
  const dice=document.getElementById("dice"); dice.textContent="🎲"; dice.removeAttribute("aria-label");
  renderBoard(); renderPlayers(); renderLog();
  pushLog(`🎲 出場順序：${players.map(p=>`${p.av.emoji}${p.name}(${p._roll})`).join(" → ")}`);
  updateTurnUI();
}

// ============================================================
// Board
// ============================================================
function roadPath(pts){
  if(pts.length<2)return"";
  let d=`M ${pts[0][0]} ${pts[0][1]}`;
  for(let i=0;i<pts.length-1;i++){
    const p0=pts[i-1]||pts[i],p1=pts[i],p2=pts[i+1],p3=pts[i+2]||p2;
    const c1x=p1[0]+(p2[0]-p0[0])/6,c1y=p1[1]+(p2[1]-p0[1])/6,c2x=p2[0]-(p3[0]-p1[0])/6,c2y=p2[1]-(p3[1]-p1[1])/6;
    d+=` C ${c1x.toFixed(1)} ${c1y.toFixed(1)} ${c2x.toFixed(1)} ${c2y.toFixed(1)} ${p2[0]} ${p2[1]}`;
  }
  return d;
}
function renderBoard(){
  const board=document.getElementById("board"); board.innerHTML="";
  board.insertAdjacentHTML("beforeend",`<svg class="road" viewBox="0 0 860 540" preserveAspectRatio="none" aria-hidden="true"><path class="road-edge" d="${roadPath(POS)}"/><path class="road-base" d="${roadPath(POS)}"/><path class="road-dash" d="${roadPath(POS)}"/></svg>`);
  BOARD.forEach((tile,i)=>{
    const el=document.createElement("div");
    el.className="tile "+(tile.cls||"");
    el.dataset.idx=i; el.style.left=POS[i][0]+"px"; el.style.top=POS[i][1]+"px";
    el.setAttribute("role","button"); el.setAttribute("tabindex","0");
    el.title=`${tile.n}. ${tile.name}`;
    el.innerHTML=`<span class="idx">${tile.n}</span><span class="icon">${tile.icon}</span><span class="label">${escapeHtml(tile.name)}</span><div class="tokens" data-idx="${i}"></div>`;
    board.appendChild(el);
  });
  renderTokens(); fitBoard();
}
function fitBoard(){
  const wrap=document.getElementById("board-wrap"),fit=document.getElementById("board-fit"),board=document.getElementById("board");
  if(!wrap||!fit||!board)return;
  const cs=getComputedStyle(wrap),avail=wrap.clientWidth-parseFloat(cs.paddingLeft)-parseFloat(cs.paddingRight);
  if(avail<=0)return;
  let s=Math.min(1,avail/860);
  if(window.matchMedia&&window.matchMedia("(max-width:480px)").matches)s=Math.max(s,0.6);
  board.style.transform=s<1?`scale(${s})`:"none"; fit.style.width=(860*s)+"px"; fit.style.height=(540*s)+"px";
}
window.addEventListener("resize",fitBoard);
function renderTokens(){
  document.querySelectorAll(".tokens").forEach(el=>el.innerHTML="");
  state.players.forEach(p=>{
    const slot=document.querySelector(`.tokens[data-idx="${p.pos}"]`); if(!slot)return;
    const tok=document.createElement("div"); tok.className="token"; tok.style.background=p.av.hex; tok.textContent=p.av.emoji; tok.title=p.name; slot.appendChild(tok);
  });
  document.querySelectorAll(".tile").forEach(el=>el.classList.remove("current"));
  const cur=currentPlayer(); if(cur){const t=document.querySelector(`.tile[data-idx="${cur.pos}"]`); if(t)t.classList.add("current");}
}
function renderPlayers(){
  const list=document.getElementById("players-list"); list.innerHTML="";
  if(isHostGame()){
    const ref=document.createElement("div"); ref.className="referee-chip";

document.getElementById("players-list").addEventListener("click",e=>{const c=e.target.closest(".player-card");if(c)openInfoPlayer(+c.dataset.pid);});
document.getElementById("board").addEventListener("click",e=>{const t=e.target.closest(".tile");if(t)openInfoTile(+t.dataset.idx);});
document.getElementById("board").addEventListener("keydown",e=>{if(e.key!=="Enter"&&e.key!==" ")return;const t=e.target.closest(".tile");if(t){e.preventDefault();openInfoTile(+t.dataset.idx);}});

function pushLog(msg,cls){state.log.unshift({msg,cls});if(state.log.length>40)state.log.pop();renderLog();}
function renderLog(){document.getElementById("log").innerHTML=state.log.slice(0,12).map(e=>`<div class="entry ${e.cls||""}">${escapeHtml(e.msg)}</div>`).join("");}
function currentPlayer(){return state.players[state.turnIdx];}
function updateTurnUI(){
  renderPlayers(); renderTokens();
  const p=currentPlayer();
  document.getElementById("turn-name").textContent=p?`輪到 ${p.av.emoji} ${p.name}`:"—";
  document.getElementById("roll-btn").disabled=state.busy||!!(p&&p.isBot);
}
function advanceTurn(){state.turnIdx=(state.turnIdx+1)%state.players.length;updateTurnUI();maybeBotTurn();}
function gameRunning(){return document.getElementById("game").classList.contains("active")&&document.getElementById("win-screen").classList.contains("hidden");}
function maybeBotTurn(){
  const p=currentPlayer();
  if(!p||!p.isBot||state.busy||!gameRunning())return;
  if(navigator.webdriver) botTurn(); else setTimeout(botTurn,650);
}
function botPause(ms){return navigator.webdriver?Promise.resolve():sleep(ms);}

// Dice
// ============================================================
const PIP={1:[4],2:[0,8],3:[0,4,8],4:[0,2,6,8],5:[0,2,4,6,8],6:[0,2,3,5,6,8]};
function dieFaceHTML(v){const on=new Set(PIP[v]||[]),red=(v===1||v===4),cls="pip"+(red?" red":"")+(v===1?" big":"");let c="";for(let i=0;i<9;i++)c+=`<span class="cell">${on.has(i)?`<span class="${cls}"></span>`:""}</span>`;return`<span class="die-face">${c}</span>`;}
function renderDie(v){const el=document.getElementById("dice");if(el){el.innerHTML=dieFaceHTML(v);el.setAttribute("aria-label",String(v));}}
function sleep(ms){return new Promise(r=>setTimeout(r,ms));}

// ============================================================
// Roll & move
// ============================================================
document.getElementById("roll-btn").addEventListener("click",onRoll);
document.addEventListener("keydown",e=>{
  if(e.key!=="Enter")return;
  if(!document.getElementById("task-backdrop").classList.contains("hidden"))return;
  if(!document.getElementById("info-backdrop").classList.contains("hidden")){document.getElementById("info-close").click();return;}
  if(!document.getElementById("win-screen").classList.contains("hidden")){document.getElementById("play-again-btn").click();return;}
  if(!state.busy&&document.getElementById("game").classList.contains("active"))onRoll();
});

async function onRoll(){
  if(state.busy)return;
  const p=currentPlayer(); if(!p||p.isBot)return;
  if(p.skipTurns>0){pushLog(`💤 ${p.name} 暫停，跳過這一輪。`);p.skipTurns-=1;advanceTurn();return;}
  if(p.maintaining){ pushLog(`🧘 ${p.name} 結束了「${p.maintaining.name}」的維持動作。`); p.maintaining=null; }
  state.busy=true; updateTurnUI();
  const reduced=window.matchMedia&&window.matchMedia("(prefers-reduced-motion: reduce)").matches;
  const dice=document.getElementById("dice"); dice.classList.add("rolling");
  if(!reduced){for(let i=0;i<6;i++){renderDie(1+Math.floor(Math.random()*6));await sleep(55);}}
  const roll=1+Math.floor(Math.random()*6); renderDie(roll); dice.classList.remove("rolling");
  pushLog(`🎲 ${p.name} 擲出了 ${roll} 點。`);
  await movePlayer(p,roll);
  if(p.pos>=GOAL_IDX){state.busy=false;return win(p);}
  await resolveTile(p);
  if(p.pos>=GOAL_IDX){state.busy=false;return win(p);}
  state.busy=false; advanceTurn();
}

// The 🤖 電腦玩家 plays its own turn automatically (rolls, moves, auto-clears its tile).
async function botTurn(){
  const p=currentPlayer();
  if(!p||!p.isBot||state.busy||!gameRunning())return;
  state.busy=true; updateTurnUI();
  if(p.skipTurns>0){pushLog(`💤 ${p.name} 暫停，跳過這一輪。`);p.skipTurns-=1;state.busy=false;return advanceTurn();}
  if(p.maintaining){p.maintaining=null;}
  await botPause(450);
  const reduced=window.matchMedia&&window.matchMedia("(prefers-reduced-motion: reduce)").matches;
  const dice=document.getElementById("dice"); dice.classList.add("rolling");
  if(!reduced&&!navigator.webdriver){for(let i=0;i<6;i++){renderDie(1+Math.floor(Math.random()*6));await sleep(55);}}
  const roll=1+Math.floor(Math.random()*6); renderDie(roll); dice.classList.remove("rolling");
  pushLog(`🎲 ${p.name} 擲出了 ${roll} 點。`);
  await movePlayer(p,roll);
  if(p.pos>=GOAL_IDX){state.busy=false;return win(p);}
  await botPause(320);
  await autoResolveTile(p);
  if(p.pos>=GOAL_IDX){state.busy=false;return win(p);}
  state.busy=false; advanceTurn();
}
// Resolve the 電腦玩家's landed tile with no modal — the 關主 administers, effect is applied & logged.
async function autoResolveTile(bot){
  const tile=BOARD[bot.pos];
  const plan=tile.plan(state.mode,state.submode);
  const kind=plan.kind;
  if(state.mode==="soft"&&plan.game){ pushLog(`🧑‍🏫 關主考驗 ${bot.av.emoji}${bot.name} 通過了「${tile.name}」。`); renderPlayers(); return; }
  if(kind==="versus"){ pushLog(`🧑‍🏫 關主考驗 ${bot.av.emoji}${bot.name} 通過了「${tile.name}」。`); renderPlayers(); return; }
  if(kind==="skip"){ bot.skipTurns+=plan.turns; pushLog(`💤 ${bot.name} 將暫停 ${plan.turns} 輪。`); renderPlayers(); return; }
  if(kind==="move"){ applyMove(bot,plan.steps); pushLog(`🚫 ${bot.name} 後退 ${Math.abs(plan.steps)} 格。`); return; }
  if(kind==="maintain"){ pushLog(`🧑‍🏫 ${bot.name} 通過了「${tile.name}」。`); renderPlayers(); return; }
  if(kind==="penalty"){
    const v=state.players[Math.floor(Math.random()*state.players.length)];
    v.score-=1; renderPlayers(); pushLog(`🏇 追兵抓到了 ${v.av.emoji}${v.name}，扣 1 分。`); return;
  }
  if(kind==="advance"){
    if(Math.random()<0.5 && bot.pos<GOAL_IDX){ bot.pos++; renderTokens(); renderPlayers(); pushLog(`🦗 ${bot.name} 前進一格。`);
      if(bot.pos<GOAL_IDX) await autoResolveTile(bot); }
    return;
  }
  if(kind==="chance"){
    const card=1+Math.floor(Math.random()*7);
    if(card===7){ bot.skipTurns+=1; renderPlayers(); pushLog(`🎴 ${bot.name} 抽到暫停一輪。`); return; }
    pushLog(`🎴 ${bot.name} 抽到前進 ${card} 步。`); applyMove(bot,card);
    if(bot.pos<GOAL_IDX) await autoResolveTile(bot);
    return;
  }
  // info / safe / goal / shoes — just pass through.
  pushLog(`🧑‍🏫 ${bot.name} 通過了「${tile.name}」。`); renderPlayers();
}

// Move with exact-roll finish: overshoot rebounds off the goal.
async function movePlayer(p,roll){
  const reduced=window.matchMedia&&window.matchMedia("(prefers-reduced-motion: reduce)").matches;
  const step=reduced?0:130;
  const needed=GOAL_IDX-p.pos, overshoot=Math.max(0,roll-needed), target=Math.min(p.pos+roll,GOAL_IDX);
  while(p.pos<target){p.pos++;renderTokens();if(step)await sleep(step);}
  if(overshoot>0){
    if(step)await sleep(step*2);
    let back=overshoot; while(back>0){p.pos--;back--;renderTokens();if(step)await sleep(step);}
    pushLog(`🛬 ${p.name} 衝過頭，反彈退回 ${overshoot} 步。`);
  }
  renderPlayers();
}
function applyMove(p,steps){
  const needed=GOAL_IDX-p.pos;
  if(steps>needed){const over=steps-needed;p.pos=Math.max(0,GOAL_IDX-over);}
  else p.pos=Math.max(0,p.pos+steps);
  renderTokens();renderPlayers();
}

// ============================================================
// Tile / task resolution
// ============================================================
async function resolveTile(p){
  const tile=BOARD[p.pos];
  await taskModal(p,tile,tile.plan(state.mode,state.submode));
}

function taskModal(p,tile,plan,opts){
  opts=opts||{};
  return new Promise(resolve=>{
    state.taskPlan={p,tile,plan};
    document.getElementById("task-icon").textContent=tile.icon;
    document.getElementById("task-title").textContent=`${tile.n}. ${tile.name}`;
    document.getElementById("task-sub").textContent=(tile.sub?tile.sub+" · ":"")+`${MODE_LABEL[state.mode]} · ${SUB_LABEL[state.submode]}`;
    document.getElementById("task-text").textContent=plan.text;
    const back=document.getElementById("task-backdrop");
    const controls=document.getElementById("task-controls"); controls.innerHTML="";
    const stage=document.getElementById("task-stage"); stage.classList.add("hidden"); stage.innerHTML="";
    back.classList.remove("hidden");
    const setText=s=>document.getElementById("task-text").textContent=s;
    const done=()=>{back.classList.add("hidden");controls.innerHTML="";stage.classList.add("hidden");stage.innerHTML="";state.taskPlan=null;resolve();};
    // await a single button press
    const button=(label,cls)=>new Promise(res=>{controls.innerHTML="";const b=document.createElement("button");b.className=cls||"good";b.textContent=label;b.onclick=res;controls.appendChild(b);b.focus&&b.focus();});
    // await one of several choices, resolving to its value
    const choice=list=>new Promise(res=>{controls.innerHTML="";list.forEach(o=>{const b=document.createElement("button");b.className=o.cls||"good";b.textContent=o.label;b.onclick=()=>res(o.val);controls.appendChild(b);});});
    // await opponent selection
    const pickOpp=()=>new Promise(res=>{controls.innerHTML="";const wrap=document.createElement("div");wrap.className="opp-list";state.players.filter(o=>o.id!==p.id).forEach(o=>{const b=document.createElement("button");b.innerHTML=`<span>${o.av.emoji} ${escapeHtml(o.name)}</span><span>第 ${BOARD[o.pos].n} 站</span>`;b.onclick=()=>res(o);wrap.appendChild(b);});controls.appendChild(wrap);});
    const doSwap=(a,b)=>{const t=a.pos;a.pos=b.pos;b.pos=t;renderTokens();renderPlayers();pushLog(`🔄 ${a.name} 與 ${b.name} 互換了格子。`);};

    (async()=>{
      const kind=plan.kind;
      // 關主模式：人類踩到挑戰格時，由關主（裁判）出題。
      if(isHostGame() && !p.isBot && (plan.game||kind==="versus"||kind==="solo")){
        pushLog(`🧑‍🏫 關主向 ${p.av.emoji}${p.name} 出題：「${tile.name}」。`);
      }

      // ----- Software mini-game tiles -----
      if(state.mode==="soft" && plan.game){
        // Solo skill task (不對戰) — play once; mistakes may deduct score.
        if(plan.kind==="solo"){
          await button("開始挑戰 🎮"); controls.innerHTML="";
          const r=await runMini(plan.game);
          if(r.penalty>0){ p.score-=r.penalty; renderPlayers(); pushLog(`〔${tile.name}〕${p.name} 失誤 ${r.penalty} 次，扣 ${r.penalty} 分。`); setText(`完成！失誤 ${r.penalty} 次，扣 ${r.penalty} 分。`); }
          else { pushLog(`✅ ${p.name} 完成了「${tile.name}」。`); setText(`完成！得分：${Math.round(r.score)}。`); }
          await button("完成 ✓"); return done();
        }
        if(state.submode==="host"){
          await button("開始挑戰 🎮"); controls.innerHTML="";
          const s=await runMini(plan.game);
          setText(`完成！你的得分：${Math.round(s.score)}。`);
          await button("完成闖關 ✓");
          pushLog(`✅ ${p.name} 完成了「${tile.name}」的挑戰。`);
          return done();
        }
        const opp=await pickOpp();
        setText(`你與 ${opp.av.emoji}${opp.name} 對戰「${tile.name}」。${p.name} 先挑戰！`);
        await button(`${p.name} 開始 →`); controls.innerHTML="";
        const ps=(await runMini(plan.game)).score;
        setText(`${p.name} 得分 ${Math.round(ps)}。換 ${opp.av.emoji}${opp.name} 挑戰！`);
        await button(`${opp.name} 開始 →`); controls.innerHTML="";
        const os=(await runMini(plan.game)).score;
        const pWin=ps>=os, winner=pWin?p:opp;
        setText(`${p.av.emoji}${p.name} ${Math.round(ps)} 比 ${opp.av.emoji}${opp.name} ${Math.round(os)} → ${winner.av.emoji}${winner.name} 獲勝！`);
        pushLog(`🏆 ${winner.name} 在「${tile.name}」勝出（${Math.round(ps)} : ${Math.round(os)}）。`);
        if(pWin && plan.swap){
          if(await choice([{label:`與 ${opp.name} 互換格子`,val:1},{label:"留在原地",val:0,cls:"ghost"}])) doSwap(p,opp);
          else await Promise.resolve();
        }else{ await button("繼續"); }
        return done();
      }

      // ----- Card kinds -----
      if(kind==="shoes"){ await button("脫下鞋襪，赤腳前行 👣"); p.shoesOff=true; renderPlayers(); pushLog(`👣 ${p.name} 脫下鞋襪，赤腳直到遊戲結束。`); return done(); }
      if(kind==="maintain"){
        const useTimer=await choice([{label:"⏱ 先計時 20 秒",val:1},{label:"直接開始維持 →",val:0,cls:"good"}]);
        if(useTimer) await countdown(stage,20,"維持動作中…");
        p.maintaining={icon:tile.icon,name:tile.name}; renderPlayers();
        pushLog(`🧘 ${p.name} 維持「${tile.name}」的動作，直到下一輪。`);
        return done();
      }
      if(kind==="info"){ await button("完成"); return done(); }
      if(kind==="safe"){ await button("平安通過 →"); return done(); }
      if(kind==="goal"){ await button("🎉 抵達終點"); return done(); }
      if(kind==="move"){ await button(`後退 ${Math.abs(plan.steps)} 格`,"warn"); applyMove(p,plan.steps); pushLog(`🚫 ${p.name} 後退 ${Math.abs(plan.steps)} 格。`); return done(); }
      if(kind==="skip"){ await button("接受（暫停一輪）","warn"); p.skipTurns+=plan.turns; pushLog(`💤 ${p.name} 將暫停 ${plan.turns} 輪。`); renderPlayers(); return done(); }
      if(kind==="penalty"){
        if(state.mode==="land" && plan.timer){ await button("開始鬼抓人 🏃"); await countdown(stage,plan.timer,"鬼抓人！快跑！"); }
        else await button("抽出受罰者","warn");
        const v=state.players[Math.floor(Math.random()*state.players.length)];
        v.score-=1; renderPlayers(); pushLog(`🏇 追兵抓到了 ${v.av.emoji}${v.name}，扣 1 分。`);
        setText(`被抓到的是 ${v.av.emoji}${v.name}，扣 1 分。`); await button("繼續"); return done();
      }
      if(kind==="advance"){
        const go=await choice([{label:"前進一格並挑戰",val:1},{label:"留在原地",val:0,cls:"ghost"}]);
        if(go && p.pos<GOAL_IDX){ p.pos++; renderTokens(); renderPlayers(); pushLog(`🦗 ${p.name} 選擇前進一格。`);
          back.classList.add("hidden"); controls.innerHTML="";
          if(p.pos<GOAL_IDX) await resolveTile(p);
          state.taskPlan=null; return resolve();
        }
        return done();
      }
      if(kind==="chance"){
        await button("🎴 抽卡");
        const card=1+Math.floor(Math.random()*7);
        if(card===7){ setText("抽到「暫停一輪」。"); p.skipTurns+=1; renderPlayers(); pushLog(`🎴 ${p.name} 抽到暫停一輪。`); await button("接受","warn"); return done(); }
        setText(`抽到「前進 ${card} 步」，並執行抵達格子的任務。`); pushLog(`🎴 ${p.name} 抽到前進 ${card} 步。`);
        await button("前進並執行"); back.classList.add("hidden"); controls.innerHTML=""; applyMove(p,card);
        if(p.pos<GOAL_IDX) await resolveTile(p);
        state.taskPlan=null; return resolve();
      }
      if(kind==="versus"){
        if(state.submode==="host"){
          // 與關主（裁判）猜拳：真的出拳、關主隨機應戰，平手重來，贏了即可過關。
          const T=[{k:"rock",e:"✊",n:"石頭"},{k:"paper",e:"✋",n:"布"},{k:"scissors",e:"✌️",n:"剪刀"}];
          const beats={rock:"scissors",paper:"rock",scissors:"paper"};
          while(true){
            setText(`${plan.text}\n\n🧑‍🏫 關主：「來，跟我猜拳吧！」出拳——`);
            const mk=await choice(T.map(t=>({label:`${t.e} ${t.n}`,val:t.k})));
            const ho=T[Math.floor(Math.random()*3)], me=T.find(t=>t.k===mk);
            if(mk===ho.k){ setText(`你出 ${me.e}${me.n}，關主出 ${ho.e}${ho.n} → 平手！再猜一次。`); await button("再猜一次 ✊"); continue; }
            if(beats[mk]===ho.k){
              pushLog(`✊ ${p.name} 猜拳贏了關主（${me.e} 對 ${ho.e}），過關。`);
              setText(`你出 ${me.e}${me.n}，關主出 ${ho.e}${ho.n} → 你贏了！🏆 過關。`);
              await button("過關 →");
            }else{
              pushLog(`💢 ${p.name} 猜拳輸給了關主（${me.e} 對 ${ho.e}）。`);
              setText(`你出 ${me.e}${me.n}，關主出 ${ho.e}${ho.n} → 你輸了，下次再加油！`);
              await button("繼續 →","warn");
            }
            break;
          }
          return done();
        }
        while(true){
          setText(plan.text+"\n\n請選擇對戰的玩家：");
          const opp=await pickOpp();
          setText(`你與 ${opp.av.emoji}${opp.name} 對戰「${tile.name}」。結果是？`);
          const r=await choice([{label:"我贏了 🏆",val:"win"},{label:"我輸了",val:"lose",cls:"warn"},{label:"← 重選對手",val:"re",cls:"ghost"}]);
          if(r==="re") continue;
          if(r==="win"){ pushLog(`🏆 ${p.name} 在「${tile.name}」贏了 ${opp.name}。`);
            if(plan.swap){ setText(`你贏了！可選擇是否與 ${opp.av.emoji}${opp.name} 互換格子（換到對方位置，但不執行該格任務）。`);
              if(await choice([{label:`與 ${opp.name} 互換格子`,val:1},{label:"留在原地",val:0,cls:"ghost"}])) doSwap(p,opp); }
          }else pushLog(`💢 ${p.name} 在「${tile.name}」輸給了 ${opp.name}。`);
          break;
        }
        return done();
      }
      await button("繼續"); return done();
    })();
  });
}

// ============================================================
// Mini-games — mount(stage, done) where done(score), higher = better.
// Under automation the engine auto-resolves so tests can play through.
// ============================================================
function runMini(key){
  return new Promise(resolve=>{
    const stage=document.getElementById("task-stage"); stage.innerHTML=""; stage.classList.remove("hidden");
    let cleanup=null, settled=false;
    const fin=r=>{ if(settled)return; settled=true; if(cleanup){try{cleanup();}catch(e){}} state.miniCleanup=null;
      stage.classList.add("hidden"); stage.innerHTML="";
      resolve(typeof r==="number"?{score:r,penalty:0}:{score:(r&&r.score)||0,penalty:(r&&r.penalty)||0}); };
    if(navigator.webdriver && !window.FORCE_MINI){ setTimeout(()=>fin({score:Math.floor(Math.random()*1000),penalty:0}),10); return; }
    cleanup=MINIGAMES[key].mount(stage,fin)||null;
    state.miniCleanup=()=>{ if(cleanup){try{cleanup();}catch(e){}} };
  });
}
// A simple visible countdown (for timed 大地 tasks). Auto-skips under automation.
function countdown(stage,secs,label){
  return new Promise(res=>{
    stage.classList.remove("hidden");
    stage.innerHTML=`<div class="mini-timer"><div class="t-num">${secs}</div><div class="t-label">${escapeHtml(label)}</div></div>`;
    if(navigator.webdriver && !window.FORCE_MINI){ stage.classList.add("hidden"); stage.innerHTML=""; return res(); }
    const num=stage.querySelector(".t-num"); let s=secs;
    const iv=setInterval(()=>{ s--; if(num)num.textContent=Math.max(0,s); if(s<=0){ clearInterval(iv); state.miniCleanup=null; stage.classList.add("hidden"); stage.innerHTML=""; res(); } },1000);
    state.miniCleanup=()=>clearInterval(iv);
  });
}
function spawnTargets(stage,done,emoji,K,move){
  let left=K,start=Date.now();
  stage.innerHTML=`<div class="mini-field"></div><div class="mini-progress">剩 ${left} 隻</div>`;
  const field=stage.querySelector(".mini-field"),prog=stage.querySelector(".mini-progress"),tgs=[];
  const W=()=>Math.max(10,field.clientWidth-44),H=()=>Math.max(10,field.clientHeight-44);
  let iv=null;
  for(let i=0;i<K;i++){
    const f=document.createElement("button"); f.className="mini-target"; f.textContent=emoji;
    f.style.left=(Math.random()*W())+"px"; f.style.top=(Math.random()*H())+"px"; field.appendChild(f); tgs.push(f);
    f.addEventListener("click",()=>{ if(f._dead)return; f._dead=true; f.remove(); left--; prog.textContent=`剩 ${left} 隻`;
      if(left<=0){ if(iv)clearInterval(iv); done(Math.max(50,18000-(Date.now()-start))); } });
  }
  if(move) iv=setInterval(()=>{ tgs.forEach(f=>{ if(f._dead)return;
    f.style.left=Math.max(0,Math.min(W(),parseFloat(f.style.left)+(Math.random()*44-22)))+"px";
    f.style.top=Math.max(0,Math.min(H(),parseFloat(f.style.top)+(Math.random()*44-22)))+"px"; }); },380);
  return ()=>{ if(iv)clearInterval(iv); };
}
const MINIGAMES={
  tap30:{mount(stage,done){
    let n=0,start=Date.now();
    stage.innerHTML=`<div class="mini-tap">快速點我！<span class="cnt" style="font-size:16px">0 / 30</span></div>`;
    const el=stage.querySelector(".mini-tap"),cnt=el.querySelector(".cnt");
    el.addEventListener("click",()=>{ n++; cnt.textContent=n+" / 30"; if(n>=30)done(Math.max(50,12000-(Date.now()-start))); });
  }},
  frogs:{mount(stage,done){ return spawnTargets(stage,done,"🐸",7,false); }},
  flies:{mount(stage,done){ return spawnTargets(stage,done,"🪰",6,true); }},
  dance:{mount(stage,done){
    const dirs={ArrowUp:"⬆️",ArrowLeft:"⬅️",ArrowDown:"⬇️",ArrowRight:"➡️"};
    const keys=Object.keys(dirs), seq=Array.from({length:8},()=>keys[Math.floor(Math.random()*4)]);
    let i=0,correct=0,start=Date.now();
    stage.innerHTML=`<div class="mini-dance"><div class="arrow"></div><div class="mini-progress">0 / ${seq.length}</div><div class="pad"></div></div>`;
    const arrowEl=stage.querySelector(".arrow"),prog=stage.querySelector(".mini-progress"),pad=stage.querySelector(".pad");
    keys.forEach(k=>{const b=document.createElement("button");b.textContent=dirs[k];b.onclick=()=>hit(k);pad.appendChild(b);});
    function render(){ arrowEl.textContent=dirs[seq[i]]; prog.textContent=i+" / "+seq.length; }
    function hit(k){ if(i>=seq.length)return; if(k===seq[i])correct++; i++;
      if(i>=seq.length){ document.removeEventListener("keydown",onKey); done(Math.max(50,correct*1500-Math.floor((Date.now()-start)/20))); } else render(); }
    function onKey(e){ if(dirs[e.key]){ e.preventDefault(); hit(e.key); } }
    document.addEventListener("keydown",onKey); render();
    return ()=>document.removeEventListener("keydown",onKey);
  }},
  typing:{mount(stage,done){
    const phrases=["我們一起走出埃及","耶和華是我的力量","跟著雲柱火柱前行","向耶和華歌唱","脫下鞋來這是聖地"];
    const target=phrases[Math.floor(Math.random()*phrases.length)],start=Date.now();
    stage.innerHTML=`<div class="mini-type-target">${target}</div><input class="mini-type-input" placeholder="照著上面打字…"><div class="mini-progress"></div>`;
    const inp=stage.querySelector("input"); setTimeout(()=>inp.focus(),40);
    inp.addEventListener("input",()=>{ if(inp.value===target)done(Math.max(50,30000-(Date.now()-start))); });
  }},
  dodge:{mount(stage,done){
    stage.innerHTML='<div class="mini-field" style="height:230px"></div><div class="mini-progress">移動滑鼠/手指左右閃避落下的冰雹與火！</div>';
    const field=stage.querySelector(".mini-field"),prog=stage.querySelector(".mini-progress");
    const guy=document.createElement("div"); guy.className="mini-guy"; guy.textContent="🧍"; field.appendChild(guy);
    let gx=0; const setGuy=x=>{ gx=Math.max(15,Math.min(field.clientWidth-15,x)); guy.style.left=gx+"px"; };
    setGuy(field.clientWidth/2);
    field.addEventListener("pointermove",e=>{ const r=field.getBoundingClientRect(); setGuy(e.clientX-r.left); });
    let hits=0,spawned=0; const N=14, active=[];
    const sp=setInterval(()=>{ if(spawned>=N){clearInterval(sp);return;} spawned++;
      const o=document.createElement("div"); o.className="mini-drop"; o.textContent=Math.random()<.5?"🧊":"🔥";
      const x=Math.random()*(field.clientWidth-22); o.style.left=x+"px"; o.style.top="-24px"; field.appendChild(o);
      active.push({el:o,x:x+11,y:-24,dead:false}); },420);
    const tick=setInterval(()=>{ const guyY=field.clientHeight-26;
      active.forEach(a=>{ if(a.dead)return; a.y+=14; a.el.style.top=a.y+"px";
        if(a.y>guyY-18 && a.y<guyY+18 && Math.abs(a.x-gx)<24){ a.dead=true; a.el.remove(); hits++; prog.textContent="被砸到 "+hits+" 次"; }
        else if(a.y>field.clientHeight){ a.dead=true; a.el.remove(); } });
      if(spawned>=N && active.every(a=>a.dead)){ clearInterval(tick); done({score:Math.max(50,2200-hits*260)}); }
    },60);
    return ()=>{ clearInterval(sp); clearInterval(tick); };
  }},
  rash:{mount(stage,done){
    const K=8; let left=K,start=Date.now();
    stage.innerHTML='<div class="mini-field" style="height:210px"></div><div class="mini-progress">按住並來回「擦拭」消除疹子（剩 '+left+'）</div>';
    const field=stage.querySelector(".mini-field"),prog=stage.querySelector(".mini-progress");
    for(let i=0;i<K;i++){ const s=document.createElement("div"); s.className="mini-rash"; s.textContent="🔴";
      s.style.left=(Math.random()*(field.clientWidth-30))+"px"; s.style.top=(Math.random()*(field.clientHeight-30))+"px"; field.appendChild(s); }
    let down=false;
    const rub=e=>{ if(!down)return; const r=field.getBoundingClientRect(),x=e.clientX-r.left,y=e.clientY-r.top;
      field.querySelectorAll(".mini-rash").forEach(s=>{ if(s._d)return; const sx=parseFloat(s.style.left)+15,sy=parseFloat(s.style.top)+15;
        if(Math.abs(x-sx)<26&&Math.abs(y-sy)<26){ s._d=true; s.remove(); left--; prog.textContent="按住擦拭消除疹子（剩 "+left+"）"; if(left<=0)done({score:Math.max(50,16000-(Date.now()-start))}); } }); };
    const up=()=>down=false;
    field.addEventListener("pointerdown",e=>{down=true;rub(e);});
    document.addEventListener("pointerup",up);
    field.addEventListener("pointermove",rub);
    field.addEventListener("click",rub2); function rub2(e){ down=true; rub(e); down=false; } // tap-to-rub fallback
    return ()=>document.removeEventListener("pointerup",up);
  }},
  trace:{mount(stage,done){
    const W=360,H=160; let errors=0,maxX=0,fin=false;
    stage.innerHTML=`<div class="mini-trace" style="position:relative;height:${H}px;background:#eef7ff;border:2px solid #b9dcf5;border-radius:12px;overflow:hidden"><svg width="100%" height="100%" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none"><path d="" stroke="#1a4d6b" stroke-width="3" fill="none"/></svg></div><div class="mini-progress">沿著線從左滑到右，盡量不要超出線（誤差 0）</div>`;
    const box=stage.querySelector(".mini-trace"),path=box.querySelector("path"),prog=stage.querySelector(".mini-progress");
    const f=x=>H/2+Math.sin(x/45)*40;
    let d="M 0 "+f(0); for(let x=4;x<=W;x+=4)d+=" L "+x+" "+f(x); path.setAttribute("d",d);
    box.addEventListener("pointermove",e=>{ if(fin)return; const r=box.getBoundingClientRect(),x=(e.clientX-r.left)/r.width*W,y=(e.clientY-r.top)/r.height*H;
      if(x>maxX)maxX=x; if(Math.abs(y-f(x))>22){ errors++; prog.textContent="沿著線滑（誤差 "+errors+"）"; }
      if(maxX>=W-8){ fin=true; done({score:Math.max(50,2000-errors*25)}); } });
  }},
  redsea:{mount(stage,done){
    const H=200; let people=4,touches=0,cur=null,drag=false;
    stage.innerHTML='<div class="mini-sea" style="position:relative;height:'+H+'px;border-radius:12px;overflow:hidden;background:linear-gradient(#6ec1e4 0 26%,#f3e3b8 26% 74%,#6ec1e4 74% 100%)"></div><div class="mini-progress">把人一個個從左拖到右側乾路盡頭，別碰到上下海水（碰到扣分）。剩 '+people+' 人</div>';
    const sea=stage.querySelector(".mini-sea"),prog=stage.querySelector(".mini-progress");
    function spawn(){ if(people<=0){ done({score:Math.max(50,2000-touches*150),penalty:touches}); return; }
      cur=document.createElement("div"); cur.className="mini-person"; cur.textContent="🧍"; cur.style.left="6px"; cur.style.top=(H/2-15)+"px"; sea.appendChild(cur); }
    const up=()=>drag=false;
    sea.addEventListener("pointerdown",e=>{ if(e.target===cur)drag=true; });
    document.addEventListener("pointerup",up);
    sea.addEventListener("pointermove",e=>{ if(!drag||!cur)return; const r=sea.getBoundingClientRect();
      let x=Math.max(0,Math.min(r.width-30,e.clientX-r.left-15)),y=Math.max(0,Math.min(H-30,e.clientY-r.top-15));
      cur.style.left=x+"px"; cur.style.top=y+"px";
      if(y<H*0.26-4||y>H*0.74-26){ if(!cur._t){cur._t=true;touches++;prog.textContent="別碰到海水（已碰 "+touches+" 次）";setTimeout(()=>{if(cur)cur._t=false;},250);} }
      if(x>=r.width-34){ cur.remove(); people--; prog.textContent="剩 "+people+" 人"; cur=null; drag=false; spawn(); } });
    spawn();
    return ()=>document.removeEventListener("pointerup",up);
  }},
  paint:{mount(stage,done){
    const W=300,H=170,cell=17, cols=Math.floor(W/cell), rows=Math.floor(H/cell);
    stage.innerHTML='<div class="mini-paint" style="position:relative;width:'+(cols*cell)+'px;max-width:100%;height:'+(rows*cell)+'px;margin:0 auto;background:#e9dcc2;border-radius:8px;overflow:hidden;touch-action:none"></div><div class="mini-progress">按住，在門框與門楣上「塗」滿羊血。</div>';
    const box=stage.querySelector(".mini-paint"),prog=stage.querySelector(".mini-progress");
    const need=new Set();
    for(let r=0;r<rows;r++)for(let c=0;c<cols;c++){ if(r<2||c<2||c>=cols-2){ need.add(r+","+c);
      const d=document.createElement("div"); d.dataset.k=r+","+c; d.style.cssText="position:absolute;left:"+(c*cell)+"px;top:"+(r*cell)+"px;width:"+cell+"px;height:"+cell+"px;background:#bda878;"; box.appendChild(d); } }
    const target=Math.ceil(need.size*0.85); let painted=0,down=false;
    const paint=e=>{ if(!down)return; const r=box.getBoundingClientRect(),cc=Math.floor((e.clientX-r.left)/cell),rr=Math.floor((e.clientY-r.top)/cell),k=rr+","+cc;
      const el=box.querySelector('[data-k="'+k+'"]'); if(el&&!el._p){ el._p=true; el.style.background="#d12f2f"; painted++; prog.textContent="塗門框（"+painted+" / "+target+"）"; if(painted>=target)done({score:1000}); } };
    const up=()=>down=false;
    box.addEventListener("pointerdown",e=>{down=true;paint(e);});
    document.addEventListener("pointerup",up);
    box.addEventListener("pointermove",paint);
    return ()=>document.removeEventListener("pointerup",up);
  }},
  arrange:{mount(stage,done){
    const goal="☁️🧍🔥"; let items; do{ items=shuffle(["☁️","🧍","🔥"]); }while(items.join("")===goal);
    let sel=-1;
    stage.innerHTML='<div class="mini-arrange"></div><div class="mini-progress">點兩個格子互換，排成「☁️ － 🧍 － 🔥」。</div>';
    const box=stage.querySelector(".mini-arrange");
    function render(){ box.innerHTML=""; items.forEach((it,i)=>{ const b=document.createElement("button"); b.className="mini-slot"+(sel===i?" sel":""); b.textContent=it; b.onclick=()=>pick(i); box.appendChild(b); }); }
    function pick(i){ if(sel<0){sel=i;render();return;} if(sel===i){sel=-1;render();return;} const t=items[sel];items[sel]=items[i];items[i]=t;sel=-1;render(); if(items.join("")===goal)setTimeout(()=>done({score:1000}),250); }
    function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
    render();
  }},
  photo:{mount(stage,done){
    stage.innerHTML='<div class="mini-photo"><input type="file" accept="image/*" class="mini-file"><div class="mini-photo-prev"></div></div><div class="mini-progress">找一個紅色的物品，拍照或選擇圖片上傳。</div>';
    const inp=stage.querySelector(".mini-file"),prev=stage.querySelector(".mini-photo-prev");

  palm:{mount(stage,done){

    const iv=setInterval(()=>{ if(shown>=N){ clearInterval(iv); setTimeout(()=>done({score:Math.max(50,score*300-penalty*150+600),penalty}),350); return; } shown++;
      const isPalm=Math.random()<.6; const b=document.createElement("button"); b.className="mini-target"; b.textContent=isPalm?"✋":"✊";
      b.style.left=(Math.random()*(field.clientWidth-44))+"px"; b.style.top=(Math.random()*(field.clientHeight-44))+"px"; field.appendChild(b);
      b.addEventListener("click",()=>{ if(b._u)return; b._u=true; if(isPalm)score++; else penalty++; upd(); b.remove(); });
      setTimeout(()=>{ if(!b._u){ b._u=true; b.remove(); } },950);
    },680); upd();
    return ()=>clearInterval(iv);
  }},
};

function openInfo(icon,title,sub,text){
  document.getElementById("info-icon").textContent=icon;
  document.getElementById("info-title").textContent=title;
  document.getElementById("info-sub").textContent=sub||"";
  document.getElementById("info-text").textContent=text||"";
  state.infoPrev=document.activeElement;
  document.getElementById("info-backdrop").classList.remove("hidden");
  document.getElementById("info-close").focus();
}
function openInfoTile(idx){
  const tile=BOARD[idx]; const plan=tile.plan(state.mode||"soft",state.submode||"vs");
  openInfo(tile.icon,`${tile.n}. ${tile.name}`,(tile.sub?tile.sub+" · ":"")+`${MODE_LABEL[state.mode]} · ${SUB_LABEL[state.submode]}`,plan.text);
}
function openInfoPlayer(pid){
  const p=state.players.find(x=>x.id===pid); if(!p)return;
  const tile=BOARD[p.pos];
  openInfo(p.av.emoji,p.name,`角色：${p.av.name}`,`目前位置：第 ${tile.n} 站「${tile.name}」\n分數：${p.score}\n${p.skipTurns>0?`暫停回合：${p.skipTurns}`:"狀態正常"}`);
}
document.getElementById("info-close").addEventListener("click",()=>{
  document.getElementById("info-backdrop").classList.add("hidden");
  const pv=state.infoPrev; state.infoPrev=null; if(pv&&document.contains(pv)&&pv.focus)pv.focus();
});
document.getElementById("info-backdrop").addEventListener("click",e=>{if(e.target.id==="info-backdrop")document.getElementById("info-close").click();});

// ============================================================
// Win
// ============================================================
function playCheer(){
  try{
    const Ctx=window.AudioContext||window.webkitAudioContext; if(!Ctx)return;
    const ac=new Ctx(); [523,659,784,1047,1319].forEach((f,i)=>{
      const o=ac.createOscillator(),g=ac.createGain(); o.type="triangle"; o.frequency.value=f;
      o.connect(g); g.connect(ac.destination); const t=ac.currentTime+i*0.11;
      g.gain.setValueAtTime(0.0001,t); g.gain.exponentialRampToValueAtTime(0.18,t+0.02); g.gain.exponentialRampToValueAtTime(0.0001,t+0.34);
      o.start(t); o.stop(t+0.36);
    });
  }catch(e){}
}
function win(winner){
  playCheer();
  pushLog(winner.isBot?`🤖 ${winner.av.emoji}${winner.name} 搶先抵達終點，玩家們再接再厲！`:`🌟 ${winner.av.emoji}${winner.name} 抵達終點，向耶和華歌唱！`,"hi");
  document.getElementById("winner-name").textContent=`${winner.av.emoji} ${winner.name}`;
  const sorted=[...state.players].sort((a,b)=>{if(a.id===winner.id)return -1;if(b.id===winner.id)return 1;if(b.pos!==a.pos)return b.pos-a.pos;return b.score-a.score;});
  document.getElementById("standings").innerHTML=sorted.map((p,i)=>`<div class="row"><span><strong>${i+1}.</strong> ${p.av.emoji} ${escapeHtml(p.name)}</span><span>第 ${BOARD[p.pos].n} 站 · ⭐ ${p.score}</span></div>`).join("");
  document.getElementById("win-screen").classList.remove("hidden");
}
