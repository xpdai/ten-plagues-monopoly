<!DOCTYPE html>
<!--
  出埃及大冒險 (Moses' Exodus board game) — skeleton build
  =======================================================
  Single self-contained file. No build, no server, no deps. Refresh = new game.

  Two play modes × two sub-modes:
    遊戲軟體模式 (web)  /  大地遊戲模式 (physical)
    × 關主模式 (vs host)  /  玩家對戰模式 (vs another player)

  26 stations follow Moses from the burning bush to the song by the sea.
  Each tile shows the task for the current mode + sub-mode. In this skeleton the
  mini-games are presented as task cards with 完成 / 我贏了 / 我輸了 buttons; the
  board, movement (exact roll to finish, aeroplane-chess rebound), turn order,
  versus-swap, 機會與命運, skips and scoring are all wired up.
-->
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#f4d9a6" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-title" content="出埃及大冒險" />
<title>出埃及大冒險</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/lxgw-wenkai-tc-webfont@1.0.0/style.css" rel="stylesheet">
<style>
  :root{
    --paper:#fbf2da; --paper2:#f6e8c9; --cream:#fffaf0;
    --ink:#4a3624; --ink-soft:#7a6347;
    --sand:#f1c25f; --sand-deep:#e0a534;
    --teal:#46aaa6; --teal-deep:#2c7d7a;
    --sky:#8cc1ee; --sky-deep:#5b9bd6;
    --coral:#ec6a4f; --coral-deep:#d2492f;
    --leaf:#88bd6a; --leaf-deep:#5f9447;
    --plum:#9779b3;
    --pop:0 3px 0 rgba(74,54,36,.20), 0 10px 22px rgba(74,54,36,.13);
    --pop-sm:0 2px 0 rgba(74,54,36,.18), 0 6px 13px rgba(74,54,36,.11);
    --grain:radial-gradient(rgba(74,54,36,.045) 1px,transparent 1.4px);
    --grain-size:8px 8px;
    --radius:22px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;color:var(--ink);min-height:100vh;-webkit-text-size-adjust:100%;
    font-family:"LXGW WenKai TC","Baloo 2","PingFang TC","Microsoft JhengHei",sans-serif;
    background:linear-gradient(180deg,#bfe6f6 0%,#d9eee4 34%,#f6e7c0 64%,#eecf91 100%);background-attachment:fixed;}
  body{padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);position:relative;z-index:0;-webkit-tap-highlight-color:rgba(0,0,0,0);}
  h1,h2,h3{font-family:"Baloo 2","LXGW WenKai TC","PingFang TC","Microsoft JhengHei",sans-serif;font-weight:800;margin:0;letter-spacing:.3px;}
  button{font-family:"Baloo 2","LXGW WenKai TC","PingFang TC",sans-serif;font-weight:700;cursor:pointer;
    border:2.5px solid var(--ink);border-radius:15px;padding:11px 18px;background:var(--sand);color:var(--ink);
    box-shadow:var(--pop-sm);transition:transform .12s cubic-bezier(.34,1.56,.64,1),box-shadow .12s ease;}
  button:hover:not(:disabled){transform:translateY(-2px) rotate(-.6deg);box-shadow:var(--pop);}
  button:active:not(:disabled){transform:translateY(1px) rotate(0);box-shadow:0 1px 0 rgba(74,54,36,.2);}
  button:disabled{opacity:.4;cursor:not-allowed;}
  .hidden{display:none !important;}

  /* ---------- Hand-drawn scene backdrop ---------- */
  #scene{position:fixed;inset:0;z-index:-1;pointer-events:none;overflow:hidden;}
  #scene .sun{position:absolute;top:5%;right:7%;width:120px;height:120px;border-radius:50%;
    background:radial-gradient(circle at 38% 34%,#fff1b8,#ffd25e 62%,#f6b73e);
    box-shadow:0 0 0 10px rgba(255,225,130,.35),0 0 60px rgba(255,205,90,.6);animation:sunbob 7s ease-in-out infinite;}
  #scene .cloud{position:absolute;font-size:64px;line-height:1;opacity:.92;filter:drop-shadow(0 6px 8px rgba(74,54,36,.08));}
  #scene .cloud.c1{top:9%;left:8%;animation:drift 26s linear infinite;}
  #scene .cloud.c2{top:18%;left:42%;font-size:48px;animation:drift 34s linear infinite;animation-delay:-8s;}
  #scene .dunes{position:absolute;left:0;right:0;bottom:0;width:100%;height:42vh;min-height:280px;}
  @keyframes sunbob{0%,100%{transform:translateY(0)}50%{transform:translateY(10px)}}
  @keyframes drift{0%{transform:translateX(-12vw)}100%{transform:translateX(112vw)}}

  /* ---------- Setup (storybook cover) ---------- */
  #setup{max-width:660px;margin:4vh auto;background:var(--paper);background-image:var(--grain);background-size:var(--grain-size);
    padding:30px 28px 26px;border:3px solid var(--ink);border-radius:30px 26px 32px 24px;box-shadow:var(--pop);position:relative;}
  #setup::before{content:"🏜️";position:absolute;top:-30px;left:50%;transform:translateX(-50%) rotate(-4deg);
    font-size:46px;background:var(--cream);border:2.5px solid var(--ink);border-radius:50%;width:70px;height:70px;
    display:flex;align-items:center;justify-content:center;box-shadow:var(--pop-sm);}
  #setup h1{font-size:38px;text-align:center;color:var(--teal-deep);margin-top:18px;text-shadow:2px 2px 0 rgba(255,255,255,.7);}
  #setup p.subtitle{text-align:center;color:var(--ink-soft);margin:8px 0 22px;font-size:15px;}
  .setup-group{margin-bottom:20px;}
  .setup-group h3{font-size:17px;margin-bottom:9px;color:var(--coral-deep);display:flex;align-items:center;gap:6px;}
  .setup-group h3::before{content:"✦";color:var(--sand-deep);}
  .choice-row{display:flex;gap:11px;flex-wrap:wrap;}
  .choice-row button{flex:1;min-width:130px;background:var(--cream);text-align:left;padding:13px 15px;border-radius:18px 14px 18px 14px;}
  .choice-row button .c-title{font-size:16px;}
  .choice-row button .c-desc{font-size:12px;font-weight:600;color:var(--ink-soft);margin-top:3px;line-height:1.35;}
  .choice-row button.active{background:#dff3f1;border-color:var(--teal-deep);box-shadow:0 0 0 3px rgba(70,170,166,.3),var(--pop-sm);}
  .count-row{display:flex;gap:11px;justify-content:center;}
  .count-row button{min-width:62px;background:var(--cream);font-size:20px;border-radius:16px;}
  .count-row button.active{background:var(--teal);color:#fff;border-color:var(--teal-deep);}
  .stepper-row{display:flex;gap:14px;flex-wrap:wrap;}
  .stepper{flex:1;min-width:150px;background:var(--cream);border:2px solid var(--line,#ece1c8);border-radius:16px;padding:12px 14px;display:flex;flex-direction:column;align-items:center;gap:8px;}
  .stepper .s-label{font-size:15px;font-weight:800;color:var(--coral-deep);}
  .stepper .s-ctrl{display:flex;align-items:center;gap:14px;}
  .stepper .s-btn{width:42px;height:42px;border-radius:50%;font-size:22px;line-height:1;padding:0;background:var(--teal);color:#fff;display:flex;align-items:center;justify-content:center;}
  .stepper .s-btn:disabled{opacity:.35;}
  .stepper .s-val{font-size:26px;font-weight:800;min-width:30px;text-align:center;color:var(--ink);}
  .count-hint{text-align:center;color:var(--ink-soft);font-size:13.5px;margin:11px 0 0;min-height:16px;}
  .player-rows{display:flex;flex-direction:column;gap:11px;}
  .player-row{display:flex;gap:11px;align-items:center;background:var(--cream);border:2.5px solid var(--ink);border-radius:18px;padding:8px 10px;box-shadow:var(--pop-sm);}
  .player-row input[type=text]{flex:1;min-width:0;padding:10px 12px;border:2.5px solid var(--ink);border-radius:12px;font-size:15px;font-family:inherit;background:#fff;color:var(--ink);}
  .player-row input[type=text]:focus{outline:none;border-color:var(--teal-deep);box-shadow:0 0 0 3px rgba(70,170,166,.25);}
  .swatches{display:flex;gap:7px;flex-wrap:wrap;}
  .swatch{width:38px;height:38px;border-radius:50%;border:3px solid rgba(74,54,36,.25);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:21px;line-height:1;box-shadow:inset 0 -3px 4px rgba(0,0,0,.15),0 2px 4px rgba(74,54,36,.25);transition:transform .12s cubic-bezier(.34,1.56,.64,1);}
  .swatch:hover{transform:scale(1.12) rotate(-4deg);}
  .swatch.selected{border-color:var(--ink);transform:scale(1.18) rotate(0);}
  .swatch.taken{opacity:.22;cursor:not-allowed;}
  #start-btn{width:100%;font-size:22px;padding:16px;background:var(--leaf);color:#fff;margin-top:8px;border-radius:20px;text-shadow:0 1px 0 rgba(74,54,36,.3);}

  /* ---------- In game ---------- */
  #game{display:none;max-width:1280px;margin:0 auto;padding:14px;}
  #game.active{display:grid;grid-template-columns:1fr 350px;gap:16px;}
  .header-bar{grid-column:1/-1;display:flex;justify-content:space-between;align-items:center;gap:9px;flex-wrap:wrap;
    background:var(--paper);background-image:var(--grain);background-size:var(--grain-size);
    padding:11px 18px;border:3px solid var(--ink);border-radius:22px 20px 24px 18px;box-shadow:var(--pop);}
  .header-bar h2{color:var(--teal-deep);font-size:22px;white-space:nowrap;}
  .header-bar .mode-tag{font-size:12.5px;font-weight:700;color:#fff;background:var(--plum);border:2px solid var(--ink);padding:5px 12px;border-radius:20px;box-shadow:var(--pop-sm);}
  .header-bar .new-game{background:var(--cream);padding:9px 14px;font-size:14px;}

  /* ---------- Board ---------- */
  #board-wrap{background:var(--paper);background-image:
      radial-gradient(circle at 18% 78%,rgba(136,189,106,.18) 0 7%,transparent 7%),
      radial-gradient(circle at 86% 22%,rgba(70,170,166,.16) 0 9%,transparent 9%),
      var(--grain);
    background-size:auto,auto,var(--grain-size);
    padding:12px;border:3px solid var(--ink);border-radius:26px 22px 26px 22px;box-shadow:var(--pop);overflow:auto;-webkit-overflow-scrolling:touch;}
  #board-fit{position:relative;margin:0 auto;}
  #board{position:relative;width:860px;height:540px;transform-origin:top left;}
  #board .road{position:absolute;inset:0;z-index:0;pointer-events:none;}
  .road-edge{fill:none;stroke:#c79f5c;stroke-width:38;stroke-linecap:round;stroke-linejoin:round;opacity:.5;}
  .road-base{fill:none;stroke:#ecd49a;stroke-width:30;stroke-linecap:round;stroke-linejoin:round;opacity:.95;}
  .road-dash{fill:none;stroke:#fff;stroke-width:4;stroke-dasharray:2 20;stroke-linecap:round;opacity:.8;}
  .tile{position:absolute;width:76px;height:64px;transform:translate(-50%,-50%) rotate(-1.6deg);z-index:1;
    background:var(--cream);border:2.5px solid var(--ink);border-radius:16px 12px 16px 12px;padding:3px;
    display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;cursor:pointer;overflow:visible;
    box-shadow:var(--pop-sm);transition:transform .14s cubic-bezier(.34,1.56,.64,1),box-shadow .14s;}
  .tile:nth-child(even){transform:translate(-50%,-50%) rotate(1.8deg);}
  .tile:hover,.tile:focus-visible{transform:translate(-50%,-50%) rotate(0) scale(1.08);box-shadow:0 0 0 3px var(--teal),var(--pop);outline:none;z-index:3;}
  .tile .icon{font-size:22px;line-height:1;filter:drop-shadow(0 1px 1px rgba(74,54,36,.18));}
  .tile .label{font-size:8.5px;font-weight:700;line-height:1.05;margin-top:1px;max-width:72px;color:var(--ink);}
  .tile .idx{position:absolute;top:-7px;left:-7px;font-size:10px;font-weight:800;color:#fff;background:var(--ink);width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;line-height:1;}
  .tile.start{background:linear-gradient(135deg,#ffe6ad,#f6c046);}
  .tile.goal{width:92px;height:78px;background:linear-gradient(135deg,#fff0bd,#ffd152);box-shadow:0 0 0 4px rgba(255,209,90,.5),var(--pop);animation:goalpulse 1.8s ease-in-out infinite;}
  .tile.goal .icon{font-size:30px;}
  .tile.move{background:linear-gradient(135deg,#ffe2e2,#ffc9c9);}
  .tile.versus{background:linear-gradient(135deg,#e2f1ff,#c9e4fb);}
  .tile.skip{background:linear-gradient(135deg,#ededed,#dcdcdc);}
  .tile.chance{background:linear-gradient(135deg,#e2ffe2,#c2f0c4);}
  .tile.current{box-shadow:0 0 0 4px var(--coral),var(--pop);z-index:2;}
  @keyframes goalpulse{0%,100%{box-shadow:0 0 0 4px rgba(255,209,90,.5),var(--pop)}50%{box-shadow:0 0 0 9px rgba(255,209,90,.32),0 0 26px rgba(255,200,80,.7)}}
  .tokens{position:absolute;bottom:-11px;left:50%;transform:translateX(-50%);display:flex;gap:3px;z-index:4;}
  .token{width:23px;height:23px;border-radius:50%;border:2.5px solid var(--cream);display:flex;align-items:center;justify-content:center;font-size:13px;line-height:1;box-shadow:inset 0 -2px 3px rgba(0,0,0,.18),0 2px 4px rgba(74,54,36,.4);animation:tokdrop .32s cubic-bezier(.34,1.56,.64,1);}
  @keyframes tokdrop{0%{transform:translateY(-10px) scale(.6);opacity:.4}100%{transform:translateY(0) scale(1);opacity:1}}

  /* ---------- Sidebar ---------- */
  #sidebar{display:flex;flex-direction:column;gap:14px;}
  .panel{background:var(--paper);background-image:var(--grain);background-size:var(--grain-size);
    padding:15px;border:3px solid var(--ink);border-radius:22px 18px 22px 18px;box-shadow:var(--pop);}
  .panel h3{font-size:17px;margin-bottom:11px;color:var(--coral-deep);display:flex;align-items:center;gap:6px;}
  .panel h3::before{content:"✦";color:var(--sand-deep);font-size:14px;}
  .player-card{display:flex;align-items:center;gap:11px;padding:9px 10px;border-radius:15px;margin-bottom:7px;border:2.5px solid transparent;cursor:pointer;transition:transform .12s,background .12s;}
  .player-card:hover{transform:translateX(2px);}
  .player-card.active{background:var(--cream);border-color:var(--sand-deep);box-shadow:var(--pop-sm);}
  .player-card.skipping{opacity:.6;}
  .player-card .av{width:34px;height:34px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:18px;line-height:1;border:2.5px solid var(--ink);box-shadow:inset 0 -2px 3px rgba(0,0,0,.16),0 2px 3px rgba(74,54,36,.25);}
  .player-card .name{font-weight:700;font-size:15px;}
  .player-card .stats{font-size:12px;color:var(--ink-soft);}
  .referee-chip{display:flex;align-items:center;gap:11px;padding:9px 10px;border-radius:15px;margin-bottom:9px;background:var(--cream);border:2.5px dashed var(--sand-deep);}
  .referee-chip .ref-av{width:34px;height:34px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:19px;background:var(--paper);border:2.5px solid var(--ink);box-shadow:inset 0 -2px 3px rgba(0,0,0,.14);}
  .referee-chip .name{font-weight:800;font-size:15px;color:var(--ink);}
  .referee-chip .stats{font-size:11px;color:var(--ink-soft);line-height:1.3;}
  .dice-area{text-align:center;}
  .dice{display:inline-flex;align-items:center;justify-content:center;width:72px;height:72px;background:var(--cream);border:3px solid var(--ink);border-radius:18px;font-size:36px;line-height:1;margin:10px 0;box-shadow:var(--pop);}
  .die-face{width:100%;height:100%;display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:repeat(3,1fr);padding:11px;box-sizing:border-box;}
  .die-face .cell{display:flex;align-items:center;justify-content:center;}
  .die-face .pip{width:10px;height:10px;border-radius:50%;background:var(--ink);box-shadow:inset 0 -1px 1px rgba(0,0,0,.25);}
  .die-face .pip.red{background:var(--coral-deep);} .die-face .pip.big{width:15px;height:15px;}
  .dice.rolling{animation:shake .42s cubic-bezier(.36,.07,.19,.97);}
  @keyframes shake{0%{transform:rotate(0) scale(1)}15%{transform:translate(-4px,2px) rotate(-12deg) scale(1.05)}35%{transform:translate(4px,-3px) rotate(12deg) scale(1.08)}55%{transform:translate(-3px,-3px) rotate(-8deg) scale(1.04)}75%{transform:translate(3px,2px) rotate(6deg) scale(1.06)}100%{transform:rotate(0) scale(1)}}
  .roll-btn{width:100%;font-size:20px;padding:15px;background:var(--leaf);color:#fff;border-radius:18px;text-shadow:0 1px 0 rgba(74,54,36,.3);}
  #turn-name{color:var(--teal-deep);}
  #log{max-height:210px;overflow-y:auto;font-size:13.5px;}
  #log .entry{padding:6px 8px;border-radius:9px;margin-bottom:3px;background:rgba(255,255,255,.5);}
  #log .entry.hi{background:#dff3f1;font-weight:700;}

  /* ---------- Modals ---------- */
  .backdrop{position:fixed;inset:0;background:rgba(50,36,24,.5);backdrop-filter:blur(2px);display:flex;align-items:center;justify-content:center;z-index:100;padding:18px;animation:fadein .2s ease;}
  @keyframes fadein{from{opacity:0}to{opacity:1}}
  .modal{background:var(--paper);background-image:var(--grain);background-size:var(--grain-size);
    padding:26px;border:3px solid var(--ink);border-radius:28px 24px 30px 22px;max-width:460px;width:calc(100vw - 36px);
    max-height:90vh;overflow-y:auto;
    text-align:center;box-shadow:0 16px 0 rgba(74,54,36,.16),0 28px 60px rgba(0,0,0,.32);animation:popin .34s cubic-bezier(.34,1.56,.64,1);}
  @keyframes popin{0%{transform:scale(.78) translateY(14px);opacity:0}100%{transform:scale(1) translateY(0);opacity:1}}
  .modal .big-icon{font-size:62px;line-height:1;margin:0 0 4px;display:inline-block;animation:iconbob 2.4s ease-in-out infinite;filter:drop-shadow(0 4px 3px rgba(74,54,36,.2));}
  @keyframes iconbob{0%,100%{transform:translateY(0) rotate(-3deg)}50%{transform:translateY(-7px) rotate(3deg)}}
  .modal h2{font-size:24px;color:var(--teal-deep);margin-bottom:5px;}
  .modal .sub{font-size:12.5px;font-weight:700;color:var(--plum);margin-bottom:12px;}
  .modal .text{font-size:15.5px;line-height:1.7;color:var(--ink);text-align:left;margin-bottom:18px;white-space:pre-line;background:rgba(255,255,255,.5);border-radius:14px;padding:12px 14px;}
  .modal .controls{display:flex;flex-direction:column;gap:9px;}
  .modal .controls button{width:100%;font-size:16px;padding:13px 16px;}
  .modal .controls .ghost{background:var(--cream);}
  .modal .controls .good{background:var(--leaf);color:#fff;text-shadow:0 1px 0 rgba(74,54,36,.3);}
  .modal .controls .warn{background:var(--coral);color:#fff;text-shadow:0 1px 0 rgba(74,54,36,.3);}
  .modal .opp-list{display:flex;flex-direction:column;gap:7px;}
  .modal .opp-list button{display:flex;justify-content:space-between;align-items:center;background:var(--cream);font-size:15px;}

  /* ---------- Mini-games ---------- */
  #task-stage{margin:4px 0 14px;}
  #task-stage.hidden{display:none;}
  .mini-tap{height:135px;border-radius:18px;background:var(--teal);color:#fff;font-size:25px;font-weight:800;border:2.5px solid var(--ink);display:flex;flex-direction:column;gap:6px;align-items:center;justify-content:center;cursor:pointer;user-select:none;-webkit-user-select:none;box-shadow:var(--pop-sm);}
  .mini-tap:active{transform:scale(.97);}
  .mini-field{position:relative;height:212px;background:linear-gradient(#eef7ff,#dcefff);border-radius:16px;overflow:hidden;border:2.5px solid var(--ink);}
  .mini-target{position:absolute;width:46px;height:46px;border-radius:50%;border:none;background:transparent;box-shadow:none;font-size:32px;line-height:1;cursor:pointer;padding:0;transition:transform .1s;}
  .mini-target:hover{transform:scale(1.18) rotate(-6deg);box-shadow:none;}
  .mini-target:active{transform:scale(1.18);}
  .mini-dance{display:flex;flex-direction:column;align-items:center;gap:9px;}
  .mini-dance .arrow{font-size:60px;line-height:1;height:66px;animation:iconbob 1.6s ease-in-out infinite;}
  .mini-dance .pad{display:grid;grid-template-columns:repeat(4,54px);gap:9px;}
  .mini-dance .pad button{font-size:23px;padding:11px 0;background:var(--cream);}
  .mini-type-target{font-size:21px;font-weight:800;background:#efe6fb;border:2.5px solid var(--ink);padding:13px;border-radius:14px;margin-bottom:9px;letter-spacing:2px;}
  .mini-type-input{width:100%;padding:12px;font-size:18px;border:2.5px solid var(--ink);border-radius:12px;font-family:inherit;}
  .mini-type-input:focus{outline:none;border-color:var(--teal-deep);box-shadow:0 0 0 3px rgba(70,170,166,.25);}
  .mini-progress{font-size:13.5px;font-weight:700;color:var(--ink-soft);margin-top:8px;text-align:center;}
  .mini-guy{position:absolute;bottom:2px;font-size:28px;line-height:1;transform:translateX(-50%);pointer-events:none;}
  .mini-drop{position:absolute;font-size:24px;line-height:1;pointer-events:none;}
  .mini-rash{position:absolute;font-size:27px;line-height:1;cursor:pointer;user-select:none;}
  .mini-person{position:absolute;font-size:28px;line-height:1;cursor:grab;touch-action:none;}
  .mini-field,.mini-sea,.mini-trace{touch-action:none;}
  .mini-arrange{display:flex;gap:11px;justify-content:center;}
  .mini-arrange .mini-slot{width:64px;height:64px;font-size:32px;background:var(--cream);border:2.5px solid var(--ink);border-radius:16px;padding:0;}
  .mini-arrange .mini-slot.sel{border-color:var(--teal-deep);background:#dff3f1;transform:scale(1.08) rotate(-3deg);}
  .mini-photo{display:flex;flex-direction:column;align-items:center;gap:9px;}
  .mini-photo .mini-file{font-size:14px;}
  .mini-photo-prev img{max-width:220px;max-height:150px;border-radius:12px;border:2.5px solid var(--ink);}
  .mini-timer{display:flex;flex-direction:column;align-items:center;gap:12px;padding:14px 0;}
  .mini-timer .ring{position:relative;width:148px;height:148px;}
  .mini-timer .ring svg{width:148px;height:148px;transform:rotate(-90deg);}
  .mini-timer .ring-bg{fill:none;stroke:rgba(74,54,36,.12);stroke-width:11;}
  .mini-timer .ring-fg{fill:none;stroke:var(--coral);stroke-width:11;stroke-linecap:round;transition:stroke-dashoffset 1s linear;}
  .mini-timer .t-num{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:56px;font-family:"Baloo 2",sans-serif;font-weight:800;color:var(--teal-deep);line-height:1;}
  .mini-timer .t-num.tick{animation:numpop .32s cubic-bezier(.34,1.56,.64,1);}
  @keyframes numpop{0%{transform:scale(1.4)}100%{transform:scale(1)}}
  .mini-timer .t-label{font-size:17px;font-weight:700;color:var(--plum);display:flex;align-items:center;gap:6px;}
  .mini-timer .t-label::before{content:"⏱";}
  .poof{position:absolute;font-size:24px;line-height:1;pointer-events:none;z-index:6;animation:poofa .5s ease forwards;}
  @keyframes poofa{0%{transform:scale(.4);opacity:1}100%{transform:scale(1.7) translateY(-12px) rotate(20deg);opacity:0}}
  [data-game="frogs"] .mini-field{background:linear-gradient(#cdeccb,#8fd29a);}
  [data-game="flies"] .mini-field{background:linear-gradient(#eaf5ff,#cfe7fb);}
  [data-game="dodge"] .mini-field{background:linear-gradient(#d6e4f2,#aec6de);}
  [data-game="palm"] .mini-field{background:linear-gradient(#e7eefb,#cdd9f2);}
  [data-game="rash"] .mini-field{background:linear-gradient(#ffeede,#ffd9c2);}
  .player-card.active .av{animation:iconbob 2.2s ease-in-out infinite;}
  #mute-btn{font-size:16px;padding:9px 12px;}

  /* ---------- Win ---------- */
  #win-screen{position:fixed;inset:0;background:linear-gradient(160deg,#bfe6f6,#ffe6a8 55%,#f6c863);display:flex;align-items:center;justify-content:center;z-index:200;padding:18px;}
  #win-screen .inner{text-align:center;max-width:540px;width:100%;background:var(--paper);background-image:var(--grain);background-size:var(--grain-size);
    padding:38px 34px;border:3px solid var(--ink);border-radius:34px 28px 36px 26px;box-shadow:0 18px 0 rgba(74,54,36,.16),0 30px 70px rgba(0,0,0,.28);
    position:relative;z-index:210;animation:popin .5s cubic-bezier(.34,1.56,.64,1);}
  #win-screen h1{font-size:38px;color:var(--teal-deep);margin-bottom:12px;}
  #win-screen h1::after{content:"🏆";display:block;font-size:62px;margin-top:8px;animation:trophybob 1.8s ease-in-out infinite;}
  @keyframes trophybob{0%,100%{transform:translateY(0) rotate(-5deg)}50%{transform:translateY(-10px) rotate(5deg)}}
  #win-screen .winner-name{font-size:30px;font-weight:800;font-family:"Baloo 2","LXGW WenKai TC",sans-serif;color:var(--coral-deep);margin:10px 0 22px;}
  #win-screen .standings{text-align:left;}
  #win-screen .standings .row{padding:11px 14px;border:2.5px solid var(--ink);border-radius:15px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;background:var(--cream);box-shadow:var(--pop-sm);font-size:15px;}
  #win-screen .standings .row:first-child{background:linear-gradient(135deg,#ffe9ab,#ffd152);}
  #win-screen button{width:100%;font-size:21px;padding:16px;background:var(--leaf);color:#fff;border-radius:20px;margin-top:18px;text-shadow:0 1px 0 rgba(74,54,36,.3);}

  /* ---------- Juice: sparkle / themed mini-scenes / token idle ---------- */
  .poof{position:absolute;font-size:22px;pointer-events:none;transform:translate(-50%,-50%);z-index:6;animation:poofpop .52s ease-out forwards;}
  @keyframes poofpop{0%{transform:translate(-50%,-50%) scale(.3) rotate(0);opacity:0}28%{opacity:1}100%{transform:translate(-50%,-95%) scale(1.5) rotate(38deg);opacity:0}}
  /* current player's token gently bobs after dropping in */
  .tile.current .token{animation:tokdrop .32s cubic-bezier(.34,1.56,.64,1),tokbob 1.25s .32s ease-in-out infinite;}
  @keyframes tokbob{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
  /* themed storybook backdrops per mini-game */
  #task-stage[data-game="frogs"] .mini-field{background:linear-gradient(#cdeccf,#8fce9e);box-shadow:inset 0 12px 24px rgba(95,148,71,.18);}
  #task-stage[data-game="flies"] .mini-field{background:linear-gradient(#fce6bd,#f0ce8b);}
  #task-stage[data-game="dodge"] .mini-field{background:linear-gradient(#9fb9da 0 40%,#c6d6e9);}
  #task-stage[data-game="rash"] .mini-field{background:linear-gradient(#f7ddc2,#edc69e);}
  #task-stage[data-game="palm"] .mini-field{background:linear-gradient(#e0eafb,#c6ddf4);}
  .mini-target{transition:transform .1s,filter .1s;}
  .mini-tap{background:linear-gradient(160deg,#54bdb8,#2c7d7a);position:relative;overflow:hidden;}
  .mini-tap::after{content:"👆";position:absolute;right:14px;bottom:8px;font-size:30px;opacity:.45;animation:iconbob 1.3s ease-in-out infinite;}
  .mini-tap .cnt{background:rgba(255,255,255,.25);padding:3px 12px;border-radius:14px;}

  /* ---------- Land-game countdown ring ---------- */
  .mini-timer .ring{position:relative;width:138px;height:138px;}
  .mini-timer .ring svg{width:138px;height:138px;transform:rotate(-90deg);}
  .mini-timer .ring-bg{fill:none;stroke:rgba(74,54,36,.14);stroke-width:12;}
  .mini-timer .ring-fg{fill:none;stroke:var(--coral);stroke-width:12;stroke-linecap:round;transition:stroke-dashoffset 1s linear;filter:drop-shadow(0 2px 3px rgba(236,106,79,.35));}
  .mini-timer .ring .t-num{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:50px;}
  .mini-timer .ring .t-num.tick{animation:tnumtick .3s cubic-bezier(.34,1.56,.64,1);}
  @keyframes tnumtick{0%{transform:scale(1.45);color:var(--coral-deep)}100%{transform:scale(1);color:var(--teal-deep)}}

  @media (max-width:760px){
    #setup{padding:24px 18px 20px;margin:5vh auto 2vh;}
    #setup h1{font-size:32px;}
    .choice-row button{min-width:100%;}
    #game{padding:8px;}
    #game.active{grid-template-columns:minmax(0,1fr);}
    .header-bar h2{font-size:19px;}
    #scene .sun{width:90px;height:90px;}
    .modal{max-height:88vh;overflow-y:auto;}
    .dice{width:84px;height:84px;}
    .roll-btn{padding:18px;font-size:22px;}
    .mini-dance .pad{grid-template-columns:repeat(4,60px);}
    .mini-arrange .mini-slot{width:72px;height:72px;}
  }
  @media (max-width:480px){
    #board-wrap{padding:8px;}
    .tile .label{display:none;}
    .roll-btn{padding:18px;font-size:21px;}
    .dice{width:84px;height:84px;}
    .token{width:26px;height:26px;font-size:15px;}
    #setup h1{font-size:28px;}
    .header-bar .mode-tag{font-size:11px;}
    .modal{padding:22px 18px;}
    .modal .controls button{padding:15px 16px;font-size:17px;}
  }
  @media (prefers-reduced-motion:reduce){*{animation:none !important;transition:none !important;}}
</style>
</head>
<body>

<div id="scene" aria-hidden="true">
  <div class="sun"></div>
  <div class="cloud c1">☁️</div>
  <div class="cloud c2">☁️</div>
  <svg class="dunes" viewBox="0 0 1440 420" preserveAspectRatio="none">
    <path d="M0 300 Q 220 230 460 290 T 960 280 T 1440 300 V420 H0 Z" fill="#e9c987" opacity=".55"/>
    <path d="M0 350 Q 300 285 620 340 T 1180 335 T 1440 350 V420 H0 Z" fill="#e0b463" opacity=".7"/>
    <g opacity=".5" fill="#d8a957">
      <path d="M560 330 L640 195 L720 330 Z"/>
      <path d="M700 332 L756 230 L812 332 Z"/>
    </g>
    <path d="M0 392 Q 360 345 760 388 T 1440 392 V420 H0 Z" fill="#d6a44f"/>
  </svg>
</div>

<!-- ============ SETUP ============ -->
<section id="setup">
  <h1>🏜️ 出埃及大冒險</h1>
  <p class="subtitle">跟著摩西，從荊棘火焰一路走到紅海對岸，向耶和華歌唱。</p>

  <div class="setup-group">
    <h3>遊玩模式</h3>
    <div class="choice-row" id="mode-row">
      <button data-mode="soft"><div class="c-title">🕹️ 遊戲軟體模式</div><div class="c-desc">在螢幕上玩迷你遊戲</div></button>
      <button data-mode="land"><div class="c-title">🌳 大地遊戲模式</div><div class="c-desc">實體場地、做動作闖關</div></button>
    </div>
  </div>

  <div class="setup-group">
    <h3>進行方式</h3>
    <div class="choice-row" id="submode-row">
      <button data-sub="host"><div class="c-title">🧑‍🏫 關主模式</div><div class="c-desc">關主主持出題、判定過關、陪你猜拳</div></button>
      <button data-sub="vs"><div class="c-title">⚔️ 玩家對戰模式</div><div class="c-desc">指定同場玩家對戰、可換格</div></button>
    </div>
  </div>

  <div class="setup-group">
    <h3>參賽人數</h3>
    <div class="stepper-row">
      <div class="stepper" id="stepper-humans">
        <div class="s-label">🙋 玩家</div>
        <div class="s-ctrl"><button class="s-btn" data-who="humans" data-d="-1" aria-label="減少玩家">−</button><span class="s-val" id="humans-val">1</span><button class="s-btn" data-who="humans" data-d="1" aria-label="增加玩家">＋</button></div>
      </div>
      <div class="stepper" id="stepper-bots">
        <div class="s-label">🤖 電腦</div>
        <div class="s-ctrl"><button class="s-btn" data-who="bots" data-d="-1" aria-label="減少電腦">−</button><span class="s-val" id="bots-val">0</span><button class="s-btn" data-who="bots" data-d="1" aria-label="增加電腦">＋</button></div>
      </div>
    </div>
    <p class="count-hint" id="count-hint"></p>
  </div>

  <div class="setup-group">
    <div class="player-rows" id="player-rows"></div>
  </div>

  <button id="start-btn">開始遊戲</button>
</section>

<!-- ============ GAME ============ -->
<section id="game">
  <div class="header-bar">
    <h2>🏜️ 出埃及大冒險</h2>
    <span class="mode-tag" id="mode-tag">—</span>
    <button class="new-game" id="mute-btn" title="音效開關" aria-label="音效開關">🔊</button>
    <button class="new-game" id="help-btn">❓ 玩法</button>
    <button class="new-game" id="new-game-btn">重新開始</button>
  </div>
  <div id="board-wrap"><div id="board-fit"><div id="board" aria-label="遊戲地圖"></div></div></div>
  <div id="sidebar">
    <div class="panel"><h3>玩家</h3><div id="players-list"></div></div>
    <div class="panel dice-area"><h3 id="turn-name">—</h3><div class="dice" id="dice">🎲</div><button class="roll-btn" id="roll-btn">擲骰子</button></div>
    <div class="panel"><h3>事件紀錄</h3><div id="log" aria-live="polite"></div></div>
  </div>
</section>

<!-- ============ TASK MODAL ============ -->
<div id="task-backdrop" class="backdrop hidden" role="dialog" aria-modal="true">
  <div class="modal">
    <div class="big-icon" id="task-icon">?</div>
    <h2 id="task-title">任務</h2>
    <div class="sub" id="task-sub"></div>
    <div class="text" id="task-text"></div>
    <div id="task-stage" class="hidden"></div>
    <div class="controls" id="task-controls"></div>
  </div>
</div>

<!-- ============ INFO (inspect) ============ -->
<div id="info-backdrop" class="backdrop hidden" role="dialog" aria-modal="true">
  <div class="modal">
    <div class="big-icon" id="info-icon">?</div>
    <h2 id="info-title"></h2>
    <div class="sub" id="info-sub"></div>
    <div class="text" id="info-text"></div>
    <div class="controls"><button id="info-close" class="good">關閉</button></div>
  </div>
</div>

<!-- ============ WIN ============ -->
<div id="win-screen" class="hidden"><div class="inner">
  <h1>🌟 抵達應許之地！</h1>
  <div class="winner-name" id="winner-name">—</div>
  <div class="standings" id="standings"></div>
  <button id="play-again-btn">再玩一局</button>
</div></div>

<script>
// ============================================================
// Data
// ============================================================
const AVATARS=[
  {id:"camel",hex:"#e76f51",emoji:"🐫",name:"駱駝"},
  {id:"sheep",hex:"#2a9d8f",emoji:"🐑",name:"綿羊"},
  {id:"eagle",hex:"#e9c46a",emoji:"🦅",name:"老鷹"},
  {id:"cactus",hex:"#c3a0f0",emoji:"🌵",name:"仙人掌"},
];
// The 電腦關主 (computer host) — only present in 遊戲軟體模式 + 關主模式.
// 關主模式（限遊戲軟體模式）：關主 🧑‍🏫 是不繞圈的裁判（出題、主持、猜拳），
// 另外有一名 🤖 電腦玩家下場與真人一起繞圈競賽。
const COMP_ID=100;
const COMP_AVS=[
  {id:"cpu1",hex:"#3a6ea5",emoji:"🤖",name:"電腦"},
  {id:"cpu2",hex:"#8a5fb0",emoji:"👾",name:"電腦"},
  {id:"cpu3",hex:"#5b7d3a",emoji:"🦾",name:"電腦"},
  {id:"cpu4",hex:"#b0653a",emoji:"🛸",name:"電腦"},
];
// 關主（裁判）只與「進行方式 = 關主模式」綁定，遊戲軟體／大地皆可。
function hasReferee(){return state.submode==="host";}

// Each tile: plan(mode, sub) -> { kind, text, swap?, steps?, turns? }
// kind ∈ info|maintain|versus|move|skip|chance|penalty|advance|safe|start|goal
const TILES=[
  {n:0,name:"起點",sub:"出發",icon:"🏁",cls:"start",
   plan:()=>({kind:"info",text:"旅程從這裡開始——擲骰子出發吧！"})},
  {n:1,name:"火燒荊棘",sub:"上帝顯現",icon:"🔥",
   plan:(m)=>m==="land"?{kind:"shoes",text:"上帝在荊棘火焰中向摩西顯現，這是聖地。請脫下你的鞋子和襪子，赤腳直到遊戲結束！"}:{kind:"move",steps:-1,text:"上帝在荊棘火焰中向摩西顯現：「不要近前來，把腳上的鞋脫下，因為你所站之地是聖地。」你還沒脫鞋就踏了上去——後退 1 格。"}},
  {n:2,name:"摩西失守傷害人",icon:"✊",cls:"versus",
   plan:(m,s)=>({kind:"versus",swap:true,rps:true,text:s==="vs"?"與你指定的玩家猜拳；贏的一方可選擇是否與對方互換格子。":"與關主猜拳，贏了即可過關。"})},
  {n:3,name:"求法老",icon:"🕺",cls:"versus",
   plan:(m,s)=>({kind:"versus",swap:true,game:m==="soft"?"dance":undefined,text:m==="land"?"在大家面前表演一小段舞蹈。"+(s==="vs"?"與對手比舞，勝者可選擇是否互換格子。":""):"跳舞機：依螢幕出現的箭頭按下對應方向鍵（或螢幕按鈕），又快又準者勝。"+(s==="vs"?"勝者可選擇是否互換格子。":"")})},
  {n:4,name:"被法老拒絕",icon:"🚫",cls:"move",
   plan:()=>({kind:"move",steps:-2,text:"法老拒絕了摩西的請求。後退 2 格。"})},
  {n:5,name:"轉告以色列人",icon:"📣",cls:"versus",
   plan:(m,s)=>({kind:"versus",swap:true,game:m==="soft"?"typing":undefined,text:m==="land"?"與對手比大聲，一起喊出「我們一起走！」最大聲者獲勝。"+(s==="vs"?"勝者可選擇是否互換格子。":""):"打字對戰：照著螢幕上的句子打字，最快正確完成者獲勝。"+(s==="vs"?"勝者可選擇是否互換格子。":"")})},
  {n:6,name:"再去找法老",icon:"🕺",cls:"versus",
   plan:(m,s)=>({kind:"versus",swap:true,game:m==="soft"?"dance":undefined,text:m==="land"?"再表演一小段舞蹈。"+(s==="vs"?"與對手比舞，勝者可選擇是否互換格子。":""):"跳舞機：依箭頭按下對應方向，又快又準者勝。"+(s==="vs"?"勝者可選擇是否互換格子。":"")})},
  {n:7,name:"杖變蛇",icon:"🐍",
   plan:(m)=>m==="land"?{kind:"maintain",text:"杖變成了蛇！像蛇一樣在地上蠕動，維持到下一輪任務開始前。"}:{kind:"solo",game:"trace",text:"描線：用滑鼠／手指沿著彎曲的線從左滑到右，盡量不要超出線外。"}},
  {n:8,name:"河水變血",icon:"🩸",cls:"versus",
   plan:(m,s)=>({kind:"versus",swap:true,game:(m==="soft"&&s==="host")?"photo":undefined,text:m==="land"?"與對手比賽找出紅色的東西，最快者勝。"+(s==="vs"?"勝者可選擇是否互換格子。":""):"找出紅色物品並拍照上傳。"+(s==="vs"?"與對手比快，最快者勝，勝者可選擇是否互換格子。":"上傳成功即可過關。")})},
  {n:9,name:"法老心剛硬",icon:"🗿",cls:"skip",
   plan:()=>({kind:"skip",turns:1,text:"法老的心剛硬。暫停一輪。"})},
  {n:10,name:"蛙災",icon:"🐸",cls:"versus",
   plan:(m,s)=>({kind:"versus",swap:true,game:m==="soft"?"frogs":undefined,text:m==="land"?"青蛙跳！比賽跳到關主指定的地方，最快抵達者勝。"+(s==="vs"?"勝者可選擇是否互換格子。":""):"點青蛙：螢幕出現很多青蛙，用滑鼠把牠們全部點掉。"+(s==="vs"?"最快消除者勝，勝者可選擇是否互換格子。":"消完即可過關。")})},
  {n:11,name:"跳蚤災",icon:"🦟",
   plan:(m,s)=>m==="land"?{kind:"maintain",text:"跳蚤上身！做出快速小碎步的動作，維持到下一輪任務開始前。"}:{kind:"versus",swap:true,game:"tap30",text:"在螢幕的藍色區塊快速點 30 下。"+(s==="vs"?"與對手比快，最快者勝，勝者可選擇是否互換格子。":"點完即可過關。")}},
  {n:12,name:"蒼蠅災",icon:"🪰",
   plan:(m,s)=>m==="soft"?{kind:"versus",swap:true,game:"flies",text:"螢幕出現數隻蒼蠅飛來飛去，用滑鼠點按擊殺。"+(s==="vs"?"最快全部擊殺者勝，勝者可選擇是否互換格子。":"全部擊殺即可過關。")}:(s==="host"?{kind:"maintain",text:"你就是蒼蠅！在範圍內四處移動，別被關主抓到。"}:{kind:"skip",turns:1,text:"蒼蠅太多，大家都關起家門不敢出門。暫停一輪。"})},
  {n:13,name:"瘟疫",icon:"🐄",
   plan:(m,s)=>(m==="soft"&&s==="host")?{kind:"safe",text:"瘟疫蔓延，但這一關你平安通過。"}:{kind:"skip",turns:1,text:"瘟疫蔓延，牲畜倒下。暫停一輪。"}},
  {n:14,name:"起泡的瘡",icon:"🔴",

// Winding path coordinates for 26 tiles (serpentine, bottom → top).
const POS=(function(){
  const n=BOARD.length, cols=7, mX=70, mY=80, W=860, H=540;
  const uW=W-2*mX, uH=H-2*mY, rows=Math.ceil(n/cols), pts=[];
  for(let i=0;i<n;i++){
    const row=Math.floor(i/cols); let col=i%cols;
    if(row%2===1) col=cols-1-col;
    const x=mX+(cols>1?uW*col/(cols-1):uW/2);
    const y=H-mY-(rows>1?uH*row/(rows-1):0);
    pts.push([Math.round(x),Math.round(y+((i%2)?-10:10))]);
  }
  return pts;
})();

async function startGame(players){
  // simple dice roll-off for turn order (highest first, ties keep order)
  players.forEach(p=>p._roll=1+Math.floor(Math.random()*6));
  players.sort((a,b)=>b._roll-a._roll);
  // 電腦玩家：自動擲骰繞圈競賽，排在所有真人之後（真人先手）。數量由玩家決定。
  const nb=Math.max(0,Math.min(MAX_BOTS,state.bots|0));
  for(let i=0;i<nb;i++){
    const av=COMP_AVS[i%COMP_AVS.length];
    players.push({id:COMP_ID+i,name:nb>1?`電腦玩家 ${i+1}`:"電腦玩家",av,avIdx:-1,pos:0,skipTurns:0,maintaining:null,shoesOff:false,isBot:true,_roll:1+Math.floor(Math.random()*6)});
  }
  state.players=players; state.turnIdx=0; state.busy=false; state.log=[];
  document.getElementById("setup").style.display="none";
  document.getElementById("game").classList.add("active");
  document.getElementById("win-screen").classList.add("hidden");
  document.getElementById("mode-tag").textContent=`${MODE_LABEL[state.mode]} · ${SUB_LABEL[state.submode]}`;
  const dice=document.getElementById("dice"); dice.textContent="🎲"; dice.removeAttribute("aria-label");
  renderBoard(); renderPlayers(); renderLog();
  pushLog(`🎲 出場順序：${players.map(p=>`${p.av.emoji}${p.name}(${p._roll})`).join(" → ")}`);
  updateTurnUI();
}

function roadPath(pts){
  if(pts.length<2)return"";
  let d=`M ${pts[0][0]} ${pts[0][1]}`;
  for(let i=0;i<pts.length-1;i++){
    const p0=pts[i-1]||pts[i],p1=pts[i],p2=pts[i+1],p3=pts[i+2]||p2;
    const c1x=p1[0]+(p2[0]-p0[0])/6,c1y=p1[1]+(p2[1]-p0[1])/6,c2x=p2[0]-(p3[0]-p1[0])/6,c2y=p2[1]-(p3[1]-p1[1])/6;
    d+=` C ${c1x.toFixed(1)} ${c1y.toFixed(1)} ${c2x.toFixed(1)} ${c2y.toFixed(1)} ${p2[0]} ${p2[1]}`;
  }
  return d;
}
function renderBoard(){
  const board=document.getElementById("board"); board.innerHTML="";
  board.insertAdjacentHTML("beforeend",`<svg class="road" viewBox="0 0 860 540" preserveAspectRatio="none" aria-hidden="true"><path class="road-edge" d="${roadPath(POS)}"/><path class="road-base" d="${roadPath(POS)}"/><path class="road-dash" d="${roadPath(POS)}"/></svg>`);
  BOARD.forEach((tile,i)=>{
    const el=document.createElement("div");
    el.className="tile "+(tile.cls||"");
    el.dataset.idx=i; el.style.left=POS[i][0]+"px"; el.style.top=POS[i][1]+"px";
    el.setAttribute("role","button"); el.setAttribute("tabindex","0");
    el.title=`${tile.n}. ${tile.name}`;
    el.innerHTML=`<span class="idx">${tile.n}</span><span class="icon">${tile.icon}</span><span class="label">${escapeHtml(tile.name)}</span><div class="tokens" data-idx="${i}"></div>`;
    board.appendChild(el);
  });
  renderTokens(); fitBoard();
}
function fitBoard(){
  const wrap=document.getElementById("board-wrap"),fit=document.getElementById("board-fit"),board=document.getElementById("board");
  if(!wrap||!fit||!board)return;
  const cs=getComputedStyle(wrap),avail=wrap.clientWidth-parseFloat(cs.paddingLeft)-parseFloat(cs.paddingRight);
  if(avail<=0)return;
  let s=Math.min(1,avail/860);
  if(window.matchMedia&&window.matchMedia("(max-width:480px)").matches)s=Math.max(s,0.6);
  board.style.transform=s<1?`scale(${s})`:"none"; fit.style.width=(860*s)+"px"; fit.style.height=(540*s)+"px";
}

const SFX={
  ctx:null, muted:false, ready:false,
  init(){ if(this.ready)return; this.ready=true; try{const C=window.AudioContext||window.webkitAudioContext; if(C)this.ctx=new C();}catch(e){} try{this.muted=localStorage.getItem("exodusMuted")==="1";}catch(e){} },
  resume(){ if(this.ctx&&this.ctx.state==="suspended"){try{this.ctx.resume();}catch(e){}} },
  tone(freq,dur,type,vol,when){ if(this.muted||!this.ctx)return; const t=this.ctx.currentTime+(when||0);
    const o=this.ctx.createOscillator(),g=this.ctx.createGain(); o.type=type||"triangle"; o.frequency.setValueAtTime(freq,t);
    o.connect(g); g.connect(this.ctx.destination); g.gain.setValueAtTime(0.0001,t); g.gain.exponentialRampToValueAtTime(vol||0.14,t+0.012); g.gain.exponentialRampToValueAtTime(0.0001,t+dur); o.start(t); o.stop(t+dur+0.03); },
  slide(f1,f2,dur,type,vol){ if(this.muted||!this.ctx)return; const t=this.ctx.currentTime;
    const o=this.ctx.createOscillator(),g=this.ctx.createGain(); o.type=type||"sine"; o.frequency.setValueAtTime(f1,t); o.frequency.exponentialRampToValueAtTime(Math.max(1,f2),t+dur);
    o.connect(g); g.connect(this.ctx.destination); g.gain.setValueAtTime(0.0001,t); g.gain.exponentialRampToValueAtTime(vol||0.14,t+0.01); g.gain.exponentialRampToValueAtTime(0.0001,t+dur); o.start(t); o.stop(t+dur+0.03); },
  roll(){ for(let i=0;i<5;i++)this.tone(170+Math.random()*130,0.06,"square",0.07,i*0.055); },
  hop(){ this.slide(420,720,0.11,"sine",0.12); },
  pop(){ this.tone(680,0.07,"square",0.12); this.tone(1020,0.06,"square",0.07,0.04); },
  success(){ [523,659,784].forEach((f,i)=>this.tone(f,0.16,"triangle",0.13,i*0.085)); },
  swap(){ this.slide(500,900,0.13,"sine",0.12); this.slide(880,520,0.16,"sine",0.09); },
  lose(){ this.slide(420,150,0.42,"sawtooth",0.11); },
  tick(){ this.tone(440,0.04,"square",0.05); },
  toggleMute(){ this.muted=!this.muted; try{localStorage.setItem("exodusMuted",this.muted?"1":"0");}catch(e){} return this.muted; }
};
["pointerdown","keydown","touchstart"].forEach(ev=>window.addEventListener(ev,()=>{SFX.init();SFX.resume();}));

  if(!document.getElementById("win-screen").classList.contains("hidden")){document.getElementById("play-again-btn").click();return;}
  if(!state.busy&&document.getElementById("game").classList.contains("active"))onRoll();
});

async function onRoll(){
  if(state.busy)return;
  const p=currentPlayer(); if(!p||p.isBot)return;
  if(p.skipTurns>0){pushLog(`💤 ${p.name} 暫停，跳過這一輪。`);p.skipTurns-=1;advanceTurn();return;}
  if(p.maintaining){ pushLog(`🧘 ${p.name} 結束了「${p.maintaining.name}」的維持動作。`); p.maintaining=null; }
  state.busy=true; updateTurnUI();
  const reduced=window.matchMedia&&window.matchMedia("(prefers-reduced-motion: reduce)").matches;
  const dice=document.getElementById("dice"); dice.classList.add("rolling"); SFX.roll();
  if(!reduced){for(let i=0;i<6;i++){renderDie(1+Math.floor(Math.random()*6));await sleep(55);}}
  const roll=1+Math.floor(Math.random()*6); renderDie(roll); dice.classList.remove("rolling");
  pushLog(`🎲 ${p.name} 擲出了 ${roll} 點。`);
  await movePlayer(p,roll);
  if(p.pos>=GOAL_IDX){state.busy=false;return win(p);}
  await resolveTile(p);
  if(p.pos>=GOAL_IDX){state.busy=false;return win(p);}
  state.busy=false; advanceTurn();
}

// The 🤖 電腦玩家 plays its own turn automatically (rolls, moves, auto-clears its tile).
async function botTurn(){
  const p=currentPlayer();
  if(!p||!p.isBot||state.busy||!gameRunning())return;
  state.busy=true; updateTurnUI();
  if(p.skipTurns>0){pushLog(`💤 ${p.name} 暫停，跳過這一輪。`);p.skipTurns-=1;state.busy=false;return advanceTurn();}
  if(p.maintaining){p.maintaining=null;}
  await botPause(450);
  const reduced=window.matchMedia&&window.matchMedia("(prefers-reduced-motion: reduce)").matches;
  const dice=document.getElementById("dice"); dice.classList.add("rolling"); SFX.roll();
  if(!reduced&&!navigator.webdriver){for(let i=0;i<6;i++){renderDie(1+Math.floor(Math.random()*6));await sleep(55);}}
  const roll=1+Math.floor(Math.random()*6); renderDie(roll); dice.classList.remove("rolling");
  pushLog(`🎲 ${p.name} 擲出了 ${roll} 點。`);
  await movePlayer(p,roll);
  if(p.pos>=GOAL_IDX){state.busy=false;return win(p);}
  await botPause(320);
  await autoResolveTile(p);
  if(p.pos>=GOAL_IDX){state.busy=false;return win(p);}
  state.busy=false; advanceTurn();
}
// Resolve the 電腦玩家's landed tile with no modal — the 關主 administers, effect is applied & logged.
async function autoResolveTile(bot){
  const tile=BOARD[bot.pos];
  const plan=tile.plan(state.mode,state.submode);
  const kind=plan.kind;
  const clr=hasReferee()?"🧑‍🏫 關主考驗 ":"🤖 ";
  if(state.mode==="soft"&&plan.game){ pushLog(`${clr}${bot.av.emoji}${bot.name} 通過了「${tile.name}」。`); renderPlayers(); return; }
  if(kind==="versus"){ pushLog(`${clr}${bot.av.emoji}${bot.name} 通過了「${tile.name}」。`); renderPlayers(); return; }
  if(kind==="skip"){ bot.skipTurns+=plan.turns; pushLog(`💤 ${bot.name} 將暫停 ${plan.turns} 輪。`); renderPlayers(); return; }
  if(kind==="move"){ applyMove(bot,plan.steps); pushLog(`🚫 ${bot.name} 後退 ${Math.abs(plan.steps)} 格。`); return; }
  if(kind==="maintain"){ pushLog(`🤖 ${bot.name} 通過了「${tile.name}」。`); renderPlayers(); return; }
  if(kind==="penalty"){
    const v=state.players[Math.floor(Math.random()*state.players.length)];
    applyMove(v,-1); pushLog(`🏇 追兵抓到了 ${v.av.emoji}${v.name}，後退 1 格。`); return;
  }
  if(kind==="advance"){
    if(Math.random()<0.5 && bot.pos<GOAL_IDX){ bot.pos++; renderTokens(); renderPlayers(); pushLog(`🦗 ${bot.name} 前進一格。`);
      if(bot.pos<GOAL_IDX) await autoResolveTile(bot); }
    return;
  }
  if(kind==="chance"){
    const card=1+Math.floor(Math.random()*7);
    if(card===7){ bot.skipTurns+=1; renderPlayers(); pushLog(`🎴 ${bot.name} 抽到暫停一輪。`); return; }
    pushLog(`🎴 ${bot.name} 抽到前進 ${card} 步。`); applyMove(bot,card);
    if(bot.pos<GOAL_IDX) await autoResolveTile(bot);
    return;
  }
  // info / safe / goal / shoes — just pass through.
  pushLog(`🤖 ${bot.name} 通過了「${tile.name}」。`); renderPlayers();
}

// Move with exact-roll finish: overshoot rebounds off the goal.
async function movePlayer(p,roll){
  const reduced=window.matchMedia&&window.matchMedia("(prefers-reduced-motion: reduce)").matches;
  const step=reduced?0:130;
  const needed=GOAL_IDX-p.pos, overshoot=Math.max(0,roll-needed), target=Math.min(p.pos+roll,GOAL_IDX);
  while(p.pos<target){p.pos++;renderTokens();SFX.hop();if(step)await sleep(step);}
  if(overshoot>0){
    if(step)await sleep(step*2);
    let back=overshoot; while(back>0){p.pos--;back--;renderTokens();SFX.tone(300,0.12,"sine",0.12);if(step)await sleep(step);}
    pushLog(`🛬 ${p.name} 衝過頭，反彈退回 ${overshoot} 步。`);
  }
  renderPlayers();
}
function applyMove(p,steps){
  const needed=GOAL_IDX-p.pos;
  if(steps>needed){const over=steps-needed;p.pos=Math.max(0,GOAL_IDX-over);}
  else p.pos=Math.max(0,p.pos+steps);
  renderTokens();renderPlayers();
}

async function resolveTile(p){
  const tile=BOARD[p.pos];
  await taskModal(p,tile,tile.plan(state.mode,state.submode));
}

function taskModal(p,tile,plan,opts){
  opts=opts||{};

    // await opponent selection
    const pickOpp=()=>new Promise(res=>{controls.innerHTML="";const wrap=document.createElement("div");wrap.className="opp-list";state.players.filter(o=>o.id!==p.id).forEach(o=>{const b=document.createElement("button");b.innerHTML=`<span>${o.av.emoji} ${escapeHtml(o.name)}</span><span>第 ${BOARD[o.pos].n} 站</span>`;b.onclick=()=>res(o);wrap.appendChild(b);});controls.appendChild(wrap);});
    const doSwap=(a,b)=>{const t=a.pos;a.pos=b.pos;b.pos=t;renderTokens();renderPlayers();SFX.swap();pushLog(`🔄 ${a.name} 與 ${b.name} 互換了格子。`);};

    (async()=>{
      const kind=plan.kind;
      // 關主模式：人類踩到挑戰格時，由關主（裁判）出題。
      if(hasReferee() && !p.isBot && (plan.game||kind==="versus"||kind==="solo")){
        pushLog(`🧑‍🏫 關主向 ${p.av.emoji}${p.name} 出題：「${tile.name}」。`);

          else { pushLog(`✅ ${p.name} 完成了「${tile.name}」。`); setText(`完成！表現得很好。`); }
          await button("完成 ✓"); return done();
        }
        if(state.submode==="host"){
          await button("開始挑戰 🎮"); controls.innerHTML="";
          await runMini(plan.game);
          setText(`完成！順利通過關主的考驗。`);
          await button("完成闖關 ✓");
          pushLog(`✅ ${p.name} 完成了「${tile.name}」的挑戰。`);
          return done();
        }
        const opp=await pickOpp();
        setText(`你與 ${opp.av.emoji}${opp.name} 對戰「${tile.name}」。${p.name} 先挑戰！`);
        await button(`${p.name} 開始 →`); controls.innerHTML="";
        const ps=(await runMini(plan.game)).score;
        let os;
        if(opp.isBot){
          setText(`${p.name} 得分 ${Math.round(ps)}。🤖 ${opp.name} 出戰中…`); controls.innerHTML="";
          await botPause(600); os=Math.floor(Math.random()*1000);
        }else{
          setText(`${p.name} 得分 ${Math.round(ps)}。換 ${opp.av.emoji}${opp.name} 挑戰！`);
          await button(`${opp.name} 開始 →`); controls.innerHTML="";
          os=(await runMini(plan.game)).score;
        }

        setText(`${p.av.emoji}${p.name} ${Math.round(ps)} 比 ${opp.av.emoji}${opp.name} ${Math.round(os)} → ${winner.av.emoji}${winner.name} 獲勝！`);
        (pWin?SFX.success():SFX.lose());
        pushLog(`🏆 ${winner.name} 在「${tile.name}」勝出（${Math.round(ps)} : ${Math.round(os)}）。`);
        if(pWin && plan.swap){
          if(await choice([{label:`與 ${opp.name} 互換格子`,val:1},{label:"留在原地",val:0,cls:"ghost"}])) doSwap(p,opp);
          else await Promise.resolve();
        }else{ await button("繼續"); }

      }

      // ----- Card kinds -----
      if(kind==="shoes"){ await button("脫下鞋襪，赤腳前行 👣"); p.shoesOff=true; renderPlayers(); pushLog(`👣 ${p.name} 脫下鞋襪，赤腳直到遊戲結束。`); return done(); }
      if(kind==="maintain"){

        if(useTimer) await countdown(stage,20,"維持動作中…");

        return done();

      if(kind==="move"){ await button(`後退 ${Math.abs(plan.steps)} 格`,"warn"); applyMove(p,plan.steps); pushLog(`🚫 ${p.name} 後退 ${Math.abs(plan.steps)} 格。`); return done(); }
      if(kind==="skip"){ await button("接受（暫停一輪）","warn"); p.skipTurns+=plan.turns; pushLog(`💤 ${p.name} 將暫停 ${plan.turns} 輪。`); renderPlayers(); return done(); }
      if(kind==="penalty"){
        if(state.mode==="land" && plan.timer){ await button("開始鬼抓人 🏃"); await countdown(stage,plan.timer,"鬼抓人！快跑！"); }
        else await button("抽出受罰者","warn");
        const v=state.players[Math.floor(Math.random()*state.players.length)];
        applyMove(v,-1); SFX.lose(); pushLog(`🏇 追兵抓到了 ${v.av.emoji}${v.name}，後退 1 格。`);
        setText(`被抓到的是 ${v.av.emoji}${v.name}，後退 1 格。`); await button("繼續"); return done();
      }
      if(kind==="advance"){
        const go=await choice([{label:"前進一格並挑戰",val:1},{label:"留在原地",val:0,cls:"ghost"}]);
        if(go && p.pos<GOAL_IDX){ p.pos++; renderTokens(); renderPlayers(); pushLog(`🦗 ${p.name} 選擇前進一格。`);
          back.classList.add("hidden"); controls.innerHTML="";
          if(p.pos<GOAL_IDX) await resolveTile(p);
          state.taskPlan=null; return resolve();
        }
        return done();
      }
      if(kind==="chance"){
        await button("🎴 抽卡");
        const card=1+Math.floor(Math.random()*7);
        if(card===7){ setText("抽到「暫停一輪」。"); p.skipTurns+=1; renderPlayers(); pushLog(`🎴 ${p.name} 抽到暫停一輪。`); await button("接受","warn"); return done(); }
        setText(`抽到「前進 ${card} 步」，並執行抵達格子的任務。`); pushLog(`🎴 ${p.name} 抽到前進 ${card} 步。`);
        await button("前進並執行"); back.classList.add("hidden"); controls.innerHTML=""; applyMove(p,card);
        if(p.pos<GOAL_IDX) await resolveTile(p);
        state.taskPlan=null; return resolve();
      }
      if(kind==="versus"){
        if(state.submode==="host"){
          // 非猜拳的闖關格：由關主主持、判定過關即可。
          if(!plan.rps){ await button("完成闖關 ✓"); pushLog(`✅ ${p.name} 完成了「${tile.name}」的闖關。`); return done(); }
          // 與關主（裁判）猜拳：真的出拳、關主隨機應戰，平手重來，贏了即可過關。
          const T=[{k:"rock",e:"✊",n:"石頭"},{k:"paper",e:"✋",n:"布"},{k:"scissors",e:"✌️",n:"剪刀"}];

            const ho=T[Math.floor(Math.random()*3)], me=T.find(t=>t.k===mk);
            if(mk===ho.k){ setText(`你出 ${me.e}${me.n}，關主出 ${ho.e}${ho.n} → 平手！再猜一次。`); await button("再猜一次 ✊"); continue; }
            if(beats[mk]===ho.k){

              setText(`你出 ${me.e}${me.n}，關主出 ${ho.e}${ho.n} → 你輸了，下次再加油！`);
              await button("繼續 →","warn");
            }
            break;
          }
          return done();
        }
        while(true){
          setText(plan.text+"\n\n請選擇對戰的玩家：");
          const opp=await pickOpp();
          setText(`你與 ${opp.av.emoji}${opp.name} 對戰「${tile.name}」。結果是？`);
          const r=await choice([{label:"我贏了 🏆",val:"win"},{label:"我輸了",val:"lose",cls:"warn"},{label:"← 重選對手",val:"re",cls:"ghost"}]);

            if(plan.swap){ setText(`你贏了！可選擇是否與 ${opp.av.emoji}${opp.name} 互換格子（換到對方位置，但不執行該格任務）。`);

          }else { SFX.lose(); pushLog(`💢 ${p.name} 在「${tile.name}」輸給了 ${opp.name}。`); }
          break;
        }
        return done();
      }
      await button("繼續"); return done();
    })();
  });
}

// ============================================================
// Mini-games — mount(stage, done) where done(score), higher = better.
// Under automation the engine auto-resolves so tests can play through.
// ============================================================
function runMini(key){
  return new Promise(resolve=>{
    const stage=document.getElementById("task-stage"); stage.innerHTML=""; stage.classList.remove("hidden");
    let cleanup=null, settled=false;
    const fin=r=>{ if(settled)return; settled=true; if(cleanup){try{cleanup();}catch(e){}} state.miniCleanup=null; SFX.success();
      stage.classList.add("hidden"); stage.innerHTML=""; stage.removeAttribute("data-game");
      resolve(typeof r==="number"?{score:r,penalty:0}:{score:(r&&r.score)||0,penalty:(r&&r.penalty)||0}); };
    if(navigator.webdriver && !window.FORCE_MINI){ setTimeout(()=>fin({score:Math.floor(Math.random()*1000),penalty:0}),10); return; }
    stage.dataset.game=key; cleanup=MINIGAMES[key].mount(stage,fin)||null;
    state.miniCleanup=()=>{ if(cleanup){try{cleanup();}catch(e){}} };
  });
}
// A simple visible countdown (for timed 大地 tasks). Auto-skips under automation.
function countdown(stage,secs,label){
  return new Promise(res=>{
    stage.classList.remove("hidden");
    stage.innerHTML=`<div class="mini-timer"><div class="ring"><svg viewBox="0 0 120 120"><circle class="ring-bg" cx="60" cy="60" r="52"/><circle class="ring-fg" cx="60" cy="60" r="52"/></svg><div class="t-num">${secs}</div></div><div class="t-label">${escapeHtml(label)}</div></div>`;
    if(navigator.webdriver && !window.FORCE_MINI){ stage.classList.add("hidden"); stage.innerHTML=""; return res(); }
    const num=stage.querySelector(".t-num"),fg=stage.querySelector(".ring-fg");
    const C=2*Math.PI*52, total=secs; if(fg){fg.style.strokeDasharray=C;fg.style.strokeDashoffset=0;}
    let s=secs; SFX.resume();
    const iv=setInterval(()=>{ s--;
      if(num){ num.textContent=Math.max(0,s); num.classList.remove("tick"); void num.offsetWidth; num.classList.add("tick"); }
      if(fg) fg.style.strokeDashoffset=C*(1-Math.max(0,s)/total);
      if(s<=3&&s>0)SFX.tone(880,0.1,"square",0.12);
      if(s<=0){ clearInterval(iv); state.miniCleanup=null; SFX.success(); stage.classList.add("hidden"); stage.innerHTML=""; res(); } },1000);
    state.miniCleanup=()=>clearInterval(iv);
  });
}
function spawnTargets(stage,done,emoji,K,move){
  let left=K,start=Date.now();
  stage.innerHTML=`<div class="mini-field"></div><div class="mini-progress">剩 ${left} 隻</div>`;
  const field=stage.querySelector(".mini-field"),prog=stage.querySelector(".mini-progress"),tgs=[];
  const W=()=>Math.max(10,field.clientWidth-44),H=()=>Math.max(10,field.clientHeight-44);
  let iv=null;
  for(let i=0;i<K;i++){
    const f=document.createElement("button"); f.className="mini-target"; f.textContent=emoji;
    f.style.left=(Math.random()*W())+"px"; f.style.top=(Math.random()*H())+"px"; field.appendChild(f); tgs.push(f);
    f.addEventListener("click",()=>{ if(f._dead)return; f._dead=true; poof(field,parseFloat(f.style.left)+8,parseFloat(f.style.top)+8); SFX.pop(); f.remove(); left--; prog.textContent=`剩 ${left} 隻`;
      if(left<=0){ if(iv)clearInterval(iv); done(Math.max(50,18000-(Date.now()-start))); } });
  }
  if(move) iv=setInterval(()=>{ tgs.forEach(f=>{ if(f._dead)return;
    f.style.left=Math.max(0,Math.min(W(),parseFloat(f.style.left)+(Math.random()*44-22)))+"px";
    f.style.top=Math.max(0,Math.min(H(),parseFloat(f.style.top)+(Math.random()*44-22)))+"px"; }); },380);
  return ()=>{ if(iv)clearInterval(iv); };
}
const MINIGAMES={
  tap30:{mount(stage,done){
    let n=0,start=Date.now();
    stage.innerHTML=`<div class="mini-tap">快速點我！<span class="cnt" style="font-size:16px">0 / 30</span></div>`;
    const el=stage.querySelector(".mini-tap"),cnt=el.querySelector(".cnt");
    el.addEventListener("click",()=>{ n++; cnt.textContent=n+" / 30"; if(n>=30)done(Math.max(50,12000-(Date.now()-start))); });
  }},
  frogs:{mount(stage,done){ return spawnTargets(stage,done,"🐸",7,false); }},
  flies:{mount(stage,done){ return spawnTargets(stage,done,"🪰",6,true); }},
  dance:{mount(stage,done){
    const dirs={ArrowUp:"⬆️",ArrowLeft:"⬅️",ArrowDown:"⬇️",ArrowRight:"➡️"};
    const keys=Object.keys(dirs), seq=Array.from({length:8},()=>keys[Math.floor(Math.random()*4)]);
    let i=0,correct=0,start=Date.now();
    stage.innerHTML=`<div class="mini-dance"><div class="arrow"></div><div class="mini-progress">0 / ${seq.length}</div><div class="pad"></div></div>`;
    const arrowEl=stage.querySelector(".arrow"),prog=stage.querySelector(".mini-progress"),pad=stage.querySelector(".pad");
    keys.forEach(k=>{const b=document.createElement("button");b.textContent=dirs[k];b.onclick=()=>hit(k);pad.appendChild(b);});
    function render(){ arrowEl.textContent=dirs[seq[i]]; prog.textContent=i+" / "+seq.length; }
    function hit(k){ if(i>=seq.length)return; if(k===seq[i])correct++; i++;
      if(i>=seq.length){ document.removeEventListener("keydown",onKey); done(Math.max(50,correct*1500-Math.floor((Date.now()-start)/20))); } else render(); }
    function onKey(e){ if(dirs[e.key]){ e.preventDefault(); hit(e.key); } }
    document.addEventListener("keydown",onKey); render();
    return ()=>document.removeEventListener("keydown",onKey);
  }},
  typing:{mount(stage,done){
    const phrases=["我們一起走出埃及","耶和華是我的力量","跟著雲柱火柱前行","向耶和華歌唱","脫下鞋來這是聖地"];
    const target=phrases[Math.floor(Math.random()*phrases.length)],start=Date.now();
    stage.innerHTML=`<div class="mini-type-target">${target}</div><input class="mini-type-input" placeholder="照著上面打字…"><div class="mini-progress"></div>`;
    const inp=stage.querySelector("input"); setTimeout(()=>inp.focus(),40);
    inp.addEventListener("input",()=>{ if(inp.value===target)done(Math.max(50,30000-(Date.now()-start))); });
  }},
  dodge:{mount(stage,done){
    stage.innerHTML='<div class="mini-field" style="height:230px"></div><div class="mini-progress">移動滑鼠/手指左右閃避落下的冰雹與火！</div>';
    const field=stage.querySelector(".mini-field"),prog=stage.querySelector(".mini-progress");
    const guy=document.createElement("div"); guy.className="mini-guy"; guy.textContent="🧍"; field.appendChild(guy);
    let gx=0; const setGuy=x=>{ gx=Math.max(15,Math.min(field.clientWidth-15,x)); guy.style.left=gx+"px"; };
    setGuy(field.clientWidth/2);
    field.addEventListener("pointermove",e=>{ const r=field.getBoundingClientRect(); setGuy(e.clientX-r.left); });
    let hits=0,spawned=0; const N=14, active=[];
    const sp=setInterval(()=>{ if(spawned>=N){clearInterval(sp);return;} spawned++;
      const o=document.createElement("div"); o.className="mini-drop"; o.textContent=Math.random()<.5?"🧊":"🔥";
      const x=Math.random()*(field.clientWidth-22); o.style.left=x+"px"; o.style.top="-24px"; field.appendChild(o);
      active.push({el:o,x:x+11,y:-24,dead:false}); },420);
    const tick=setInterval(()=>{ const guyY=field.clientHeight-26;
      active.forEach(a=>{ if(a.dead)return; a.y+=14; a.el.style.top=a.y+"px";
        if(a.y>guyY-18 && a.y<guyY+18 && Math.abs(a.x-gx)<24){ a.dead=true; a.el.remove(); hits++; prog.textContent="被砸到 "+hits+" 次"; }
        else if(a.y>field.clientHeight){ a.dead=true; a.el.remove(); } });
      if(spawned>=N && active.every(a=>a.dead)){ clearInterval(tick); done({score:Math.max(50,2200-hits*260)}); }
    },60);
    return ()=>{ clearInterval(sp); clearInterval(tick); };
  }},
  rash:{mount(stage,done){
    const K=8; let left=K,start=Date.now();
    stage.innerHTML='<div class="mini-field" style="height:210px"></div><div class="mini-progress">按住並來回「擦拭」消除疹子（剩 '+left+'）</div>';
    const field=stage.querySelector(".mini-field"),prog=stage.querySelector(".mini-progress");
    for(let i=0;i<K;i++){ const s=document.createElement("div"); s.className="mini-rash"; s.textContent="🔴";
      s.style.left=(Math.random()*(field.clientWidth-30))+"px"; s.style.top=(Math.random()*(field.clientHeight-30))+"px"; field.appendChild(s); }
    let down=false;
    const rub=e=>{ if(!down)return; const r=field.getBoundingClientRect(),x=e.clientX-r.left,y=e.clientY-r.top;
      field.querySelectorAll(".mini-rash").forEach(s=>{ if(s._d)return; const sx=parseFloat(s.style.left)+15,sy=parseFloat(s.style.top)+15;
        if(Math.abs(x-sx)<26&&Math.abs(y-sy)<26){ s._d=true; s.remove(); left--; prog.textContent="按住擦拭消除疹子（剩 "+left+"）"; if(left<=0)done({score:Math.max(50,16000-(Date.now()-start))}); } }); };
    const up=()=>down=false;
    field.addEventListener("pointerdown",e=>{down=true;rub(e);});
    document.addEventListener("pointerup",up);
    field.addEventListener("pointermove",rub);
    field.addEventListener("click",rub2); function rub2(e){ down=true; rub(e); down=false; } // tap-to-rub fallback
    return ()=>document.removeEventListener("pointerup",up);
  }},
  trace:{mount(stage,done){
    const W=360,H=160; let errors=0,maxX=0,fin=false;
    stage.innerHTML=`<div class="mini-trace" style="position:relative;height:${H}px;background:#eef7ff;border:2px solid #b9dcf5;border-radius:12px;overflow:hidden"><svg width="100%" height="100%" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none"><path d="" stroke="#1a4d6b" stroke-width="3" fill="none"/></svg></div><div class="mini-progress">沿著線從左滑到右，盡量不要超出線（誤差 0）</div>`;
    const box=stage.querySelector(".mini-trace"),path=box.querySelector("path"),prog=stage.querySelector(".mini-progress");
    const f=x=>H/2+Math.sin(x/45)*40;
    let d="M 0 "+f(0); for(let x=4;x<=W;x+=4)d+=" L "+x+" "+f(x); path.setAttribute("d",d);
    box.addEventListener("pointermove",e=>{ if(fin)return; const r=box.getBoundingClientRect(),x=(e.clientX-r.left)/r.width*W,y=(e.clientY-r.top)/r.height*H;
      if(x>maxX)maxX=x; if(Math.abs(y-f(x))>22){ errors++; prog.textContent="沿著線滑（誤差 "+errors+"）"; }
      if(maxX>=W-8){ fin=true; done({score:Math.max(50,2000-errors*25)}); } });
  }},
  redsea:{mount(stage,done){
    const H=200; let people=4,touches=0,cur=null,drag=false;
    stage.innerHTML='<div class="mini-sea" style="position:relative;height:'+H+'px;border-radius:12px;overflow:hidden;background:linear-gradient(#6ec1e4 0 26%,#f3e3b8 26% 74%,#6ec1e4 74% 100%)"></div><div class="mini-progress">把人一個個從左拖到右側乾路盡頭，別碰到上下海水（碰到扣分）。剩 '+people+' 人</div>';
    const sea=stage.querySelector(".mini-sea"),prog=stage.querySelector(".mini-progress");
    function spawn(){ if(people<=0){ done({score:Math.max(50,2000-touches*150),penalty:touches}); return; }
      cur=document.createElement("div"); cur.className="mini-person"; cur.textContent="🧍"; cur.style.left="6px"; cur.style.top=(H/2-15)+"px"; sea.appendChild(cur); }
    const up=()=>drag=false;
    sea.addEventListener("pointerdown",e=>{ if(e.target===cur)drag=true; });
    document.addEventListener("pointerup",up);
    sea.addEventListener("pointermove",e=>{ if(!drag||!cur)return; const r=sea.getBoundingClientRect();
      let x=Math.max(0,Math.min(r.width-30,e.clientX-r.left-15)),y=Math.max(0,Math.min(H-30,e.clientY-r.top-15));
      cur.style.left=x+"px"; cur.style.top=y+"px";
      if(y<H*0.26-4||y>H*0.74-26){ if(!cur._t){cur._t=true;touches++;prog.textContent="別碰到海水（已碰 "+touches+" 次）";setTimeout(()=>{if(cur)cur._t=false;},250);} }
      if(x>=r.width-34){ cur.remove(); people--; prog.textContent="剩 "+people+" 人"; cur=null; drag=false; spawn(); } });
    spawn();
    return ()=>document.removeEventListener("pointerup",up);
  }},
  paint:{mount(stage,done){
    const W=300,H=170,cell=17, cols=Math.floor(W/cell), rows=Math.floor(H/cell);
    stage.innerHTML='<div class="mini-paint" style="position:relative;width:'+(cols*cell)+'px;max-width:100%;height:'+(rows*cell)+'px;margin:0 auto;background:#e9dcc2;border-radius:8px;overflow:hidden;touch-action:none"></div><div class="mini-progress">按住，在門框與門楣上「塗」滿羊血。</div>';
    const box=stage.querySelector(".mini-paint"),prog=stage.querySelector(".mini-progress");
    const need=new Set();
    for(let r=0;r<rows;r++)for(let c=0;c<cols;c++){ if(r<2||c<2||c>=cols-2){ need.add(r+","+c);
      const d=document.createElement("div"); d.dataset.k=r+","+c; d.style.cssText="position:absolute;left:"+(c*cell)+"px;top:"+(r*cell)+"px;width:"+cell+"px;height:"+cell+"px;background:#bda878;"; box.appendChild(d); } }
    const target=Math.ceil(need.size*0.85); let painted=0,down=false;
    const paint=e=>{ if(!down)return; const r=box.getBoundingClientRect(),cc=Math.floor((e.clientX-r.left)/cell),rr=Math.floor((e.clientY-r.top)/cell),k=rr+","+cc;
      const el=box.querySelector('[data-k="'+k+'"]'); if(el&&!el._p){ el._p=true; el.style.background="#d12f2f"; painted++; prog.textContent="塗門框（"+painted+" / "+target+"）"; if(painted>=target)done({score:1000}); } };
    const up=()=>down=false;
    box.addEventListener("pointerdown",e=>{down=true;paint(e);});
    document.addEventListener("pointerup",up);
    box.addEventListener("pointermove",paint);
    return ()=>document.removeEventListener("pointerup",up);
  }},
  arrange:{mount(stage,done){
    const goal="☁️🧍🔥"; let items; do{ items=shuffle(["☁️","🧍","🔥"]); }while(items.join("")===goal);
    let sel=-1;
    stage.innerHTML='<div class="mini-arrange"></div><div class="mini-progress">點兩個格子互換，排成「☁️ － 🧍 － 🔥」。</div>';
    const box=stage.querySelector(".mini-arrange");
    function render(){ box.innerHTML=""; items.forEach((it,i)=>{ const b=document.createElement("button"); b.className="mini-slot"+(sel===i?" sel":""); b.textContent=it; b.onclick=()=>pick(i); box.appendChild(b); }); }
    function pick(i){ if(sel<0){sel=i;render();return;} if(sel===i){sel=-1;render();return;} const t=items[sel];items[sel]=items[i];items[i]=t;sel=-1;render(); if(items.join("")===goal)setTimeout(()=>done({score:1000}),250); }
    function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
    render();
  }},
  photo:{mount(stage,done){
    stage.innerHTML='<div class="mini-photo"><input type="file" accept="image/*" class="mini-file"><div class="mini-photo-prev"></div></div><div class="mini-progress">找一個紅色的物品，拍照或選擇圖片上傳。</div>';
    const inp=stage.querySelector(".mini-file"),prev=stage.querySelector(".mini-photo-prev");
    inp.addEventListener("change",()=>{ const f=inp.files&&inp.files[0]; if(!f)return; try{ prev.innerHTML='<img src="'+URL.createObjectURL(f)+'" alt="">'; }catch(e){} setTimeout(()=>done({score:1000}),400); });
  }},
  palm:{mount(stage,done){
    let score=0,penalty=0,shown=0; const N=12;
    stage.innerHTML='<div class="mini-field" style="height:200px"></div><div class="mini-progress">點「✋」、別點「✊」（誤點扣分）。命中 0 / 誤點 0</div>';
    const field=stage.querySelector(".mini-field"),prog=stage.querySelector(".mini-progress");
    const upd=()=>prog.textContent="點 ✋、別點 ✊。命中 "+score+" / 誤點 "+penalty;
    const iv=setInterval(()=>{ if(shown>=N){ clearInterval(iv); setTimeout(()=>done({score:Math.max(50,score*300-penalty*150+600),penalty}),350); return; } shown++;
      const isPalm=Math.random()<.6; const b=document.createElement("button"); b.className="mini-target"; b.textContent=isPalm?"✋":"✊";
      b.style.left=(Math.random()*(field.clientWidth-44))+"px"; b.style.top=(Math.random()*(field.clientHeight-44))+"px"; field.appendChild(b);
      b.addEventListener("click",()=>{ if(b._u)return; b._u=true; if(isPalm)score++; else penalty++; upd(); b.remove(); });
      setTimeout(()=>{ if(!b._u){ b._u=true; b.remove(); } },950);
    },680); upd();
    return ()=>clearInterval(iv);
  }},
};

  document.getElementById("info-title").textContent=title;
  document.getElementById("info-sub").textContent=sub||"";
  document.getElementById("info-text").textContent=text||"";

  document.getElementById("info-close").focus();
}
function openInfoTile(idx){
  const tile=BOARD[idx]; const plan=tile.plan(state.mode||"soft",state.submode||"vs");
  openInfo(tile.icon,`${tile.n}. ${tile.name}`,(tile.sub?tile.sub+" · ":"")+`${MODE_LABEL[state.mode]} · ${SUB_LABEL[state.submode]}`,plan.text);
}
function openInfoPlayer(pid){
  const p=state.players.find(x=>x.id===pid); if(!p)return;
  const tile=BOARD[p.pos];
  const st=[p.skipTurns>0?`暫停 ${p.skipTurns} 回合`:"",p.maintaining?`維持「${p.maintaining.name}」`:"",p.shoesOff?"赤腳":""].filter(Boolean).join("、")||"狀態正常";
  openInfo(p.av.emoji,p.name,`角色：${p.isBot?"電腦玩家":p.av.name}`,`目前位置：第 ${tile.n} 站「${tile.name}」\n${st}`);
}
document.getElementById("info-close").addEventListener("click",()=>{
  document.getElementById("info-backdrop").classList.add("hidden");

// Win
// ============================================================
function playCheer(){
  if(window.SFX&&SFX.muted)return;
  try{
    const Ctx=window.AudioContext||window.webkitAudioContext; if(!Ctx)return;
    const ac=new Ctx(); [523,659,784,1047,1319].forEach((f,i)=>{
      const o=ac.createOscillator(),g=ac.createGain(); o.type="triangle"; o.frequency.value=f;
      o.connect(g); g.connect(ac.destination); const t=ac.currentTime+i*0.11;
      g.gain.setValueAtTime(0.0001,t); g.gain.exponentialRampToValueAtTime(0.18,t+0.02); g.gain.exponentialRampToValueAtTime(0.0001,t+0.34);
      o.start(t); o.stop(t+0.36);
    });
  }catch(e){}
}
let _confettiRAF=null,_confettiCanvas=null;
function stopConfetti(){ if(_confettiRAF){cancelAnimationFrame(_confettiRAF);_confettiRAF=null;} if(_confettiCanvas){_confettiCanvas.remove();_confettiCanvas=null;} }
function launchConfetti(){
  if(window.matchMedia&&window.matchMedia("(prefers-reduced-motion: reduce)").matches)return;
  stopConfetti();
  const c=document.createElement("canvas"); c.id="confetti-canvas";
  c.style.cssText="position:fixed;inset:0;width:100%;height:100%;pointer-events:none;z-index:260;";
  document.body.appendChild(c); _confettiCanvas=c;
  const ctx=c.getContext("2d"); const dpr=Math.min(2,window.devicePixelRatio||1); let W=0,H=0;
  const size=()=>{W=c.clientWidth;H=c.clientHeight;c.width=W*dpr;c.height=H*dpr;ctx.setTransform(dpr,0,0,dpr,0,0);};
  size(); window.addEventListener("resize",size,{once:true});
  const COLORS=["#f1c25f","#ec6a4f","#46aaa6","#8cc1ee","#88bd6a","#9779b3","#fffaf0"];
  const parts=[];
  for(let i=0;i<160;i++){parts.push({x:Math.random()*W,y:-20-Math.random()*H*0.6,r:6+Math.random()*8,c:COLORS[i%COLORS.length],vx:(Math.random()-0.5)*1.5,vy:2.2+Math.random()*3.2,rot:Math.random()*6.28,vr:(Math.random()-0.5)*0.34,sh:Math.random()<0.45?1:0});}
  const start=Date.now();
  function frame(){
    const t=Date.now()-start; ctx.clearRect(0,0,W,H);
    for(const p of parts){
      p.x+=p.vx; p.y+=p.vy; p.vy+=0.035; p.rot+=p.vr; p.vx+=Math.sin(t/600+p.y/40)*0.02;
      ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.rot);
      ctx.globalAlpha=t>2700?Math.max(0,1-(t-2700)/1300):1; ctx.fillStyle=p.c;
      if(p.sh){ctx.beginPath();ctx.arc(0,0,p.r*0.55,0,6.3);ctx.fill();}
      else{ctx.fillRect(-p.r/2,-p.r/2,p.r,p.r*0.62);}
      ctx.restore();
    }
    if(t<4000){_confettiRAF=requestAnimationFrame(frame);}else{stopConfetti();}
  }
  frame();
}
function win(winner){
  playCheer();
  launchConfetti();
  pushLog(winner.isBot?`🤖 ${winner.av.emoji}${winner.name} 搶先抵達終點，玩家們再接再厲！`:`🌟 ${winner.av.emoji}${winner.name} 抵達終點，向耶和華歌唱！`,"hi");
  document.getElementById("winner-name").textContent=`${winner.av.emoji} ${winner.name}`;
  const sorted=[...state.players].sort((a,b)=>{if(a.id===winner.id)return -1;if(b.id===winner.id)return 1;return b.pos-a.pos;});
  document.getElementById("standings").innerHTML=sorted.map((p,i)=>`<div class="row"><span><strong>${i+1}.</strong> ${p.av.emoji} ${escapeHtml(p.name)}</span><span>第 ${BOARD[p.pos].n} 站</span></div>`).join("");
  document.getElementById("win-screen").classList.remove("hidden");
}

  document.getElementById("win-screen").classList.add("hidden");
  document.getElementById("task-backdrop").classList.add("hidden");
  document.getElementById("info-backdrop").classList.add("hidden");

  const stage=document.getElementById("task-stage"); stage.classList.add("hidden"); stage.innerHTML="";

}

  openInfo("📖","玩法說明",MODE_LABEL[state.mode]+" · "+SUB_LABEL[state.submode],
    "🎯 目標：輪流擲骰前進，最先「剛好」抵達終點（第 26 站）者獲勝；點數超過終點會像飛行棋一樣反彈退回。\n\n"+
    "🎮 模式：\n• 遊戲軟體模式：在螢幕上玩迷你遊戲。\n• 大地遊戲模式：在實體場地做動作闖關。\n兩種模式都可搭配「關主模式」或「玩家對戰模式」。\n\n"+

    "🎴 機會與命運（法老放行）：抽卡決定前進步數，或暫停一輪。\n🏇 追兵：隨機抽一位玩家後退 1 格。\n🧘 大地維持動作：做出動作維持到下一輪，輪到你時自動解除。\n\n"+
    "💡 點任一格可查看該格任務；點玩家卡可查看狀態。");
